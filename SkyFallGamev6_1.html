<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; }
        #ghud { display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 460px; margin-bottom: 8px; font-size: 14px; text-shadow: 2px 2px 4px #000; z-index: 20; }
        #gc { position: relative; width: 95%; max-width: 460px; }
        canvas#g { display: block; width: 100%; height: auto; border: 3px solid #444; border-radius: 20px; background: #000; }
        #meru-logo { position: absolute; top: 15px; left: 15px; width: 55px; height: 55px; border-radius: 10px; border: 2px solid #6abb30; z-index: 15; opacity: 0.9; }
        #gov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 30; border-radius: 18px; display: none; }
        .gtitle { font-size: 50px; color: #f0c040; -webkit-text-stroke: 2px #7a5010; margin-bottom: 5px; }
        #gbtn { padding: 14px 40px; background: #3a8820; border: none; border-bottom: 4px solid #225510; color: #fff; border-radius: 30px; font-size: 22px; cursor: pointer; }
        .stat-val { color: #f0c040; }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALTITUDE: <b id="alt" class="stat-val">100</b>km</span>
    <span style="
    border: solid; border-width: 3px; ">COINS: <b id="cn" class="stat-val">0</b></span>
    <span>LIVES: <b id="lv" class="stat-val">★★★★★</b></span>
</div>

<div id="gc">
    <img src="Assets/images/MeruGamesLogoSkyFall2.png" id="meru-logo" alt="Meru Games">
    <canvas id="g" width="460" height="600"></canvas>
    <div id="gov">
        <div id="msg-box" style="text-align:center;">
            <div class="gtitle">SKYFALL</div>
            <div id="gfs" style="color:#fff; font-size: 18px; margin-bottom:15px;"></div>
            <button id="gbtn">BEGIN RE-ENTRY</button>
        </div>
    </div>
</div>

<script>
const CV = document.getElementById('g'), CX = CV.getContext('2d');
const W = CV.width, H = CV.height;
const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn');
const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), LV = document.getElementById('lv'), GFS = document.getElementById('gfs');

// --- Configuration & Classes ---
const CHARS = {
    'BALANCED': { color: '#fff', speed: 1.2, drift: 0.9, lives: 5, info: "Standard" },
    'TANK': { color: '#f44', speed: 2.2, drift: 0.4, lives: 8, info: "Heavy/Sturdy" },
    'GHOST': { color: '#0ff', speed: 0.8, drift: 1.5, lives: 3, info: "Agile/Fragile" }
};

class Diver {
    constructor(x, y, config, isAI = false) {
        this.x = x; this.y = y;
        this.config = config;
        this.isAI = isAI;
        this.vx = 0;
        this.w = 1; this.h = 1;
        this.legSwing = 0;
        this.landed = false;
        this.aiSpeed = 0.8 + Math.random() * 0.5; // Individual AI speed variation
    }

    update(targetX, obstacles) {
        if (this.landed) return;
        
        if (this.isAI) {
            let steer = 0;
            // 1. Obstacle Avoidance (Priority)
            let danger = obstacles.find(o => Math.abs(o.x - this.x) < 40 && o.y > this.y && o.y < this.y + 150);
            if (danger) {
                steer = this.x < danger.x ? -1.5 : 1.5;
            } else {
                // 2. Strive for Target Position
                let diff = targetX - this.x;
                steer = diff * 0.02;
            }
            this.vx += steer * this.aiSpeed;
            this.vx *= 0.85;
        } else {
            if (keys.a) this.vx -= this.config.drift;
            if (keys.d) this.vx += this.config.drift;
            this.vx *= 0.86;
        }
        
        this.x += this.vx;
        this.x = Math.max(25, Math.min(W - 25, this.x));
        this.legSwing += 0.2 * (this.isAI ? 1.2 : player.speedMult);
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.landed) {
            ctx.strokeStyle = this.config.color; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, -35, 6, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -29); ctx.lineTo(0, -10); ctx.stroke();
        } else {
            let sMult = this.isAI ? 1.2 : player.speedMult;
            let tW = sMult < 1 ? 1.5 : (sMult > 2 ? 0.6 : 1);
            let tH = sMult < 1 ? 0.6 : (sMult > 2 ? 1.6 : 1);
            this.w += (tW - this.w) * 0.1; this.h += (tH - this.h) * 0.1;
            ctx.scale(this.w, this.h);
            ctx.rotate(this.vx * 0.06);
            ctx.strokeStyle = this.config.color; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 15, 6, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(0, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
            let k = Math.sin(this.legSwing) * 12;
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-6, -25+k); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(6, -25-k); ctx.stroke();
        }
        ctx.restore();
    }
}

// --- Game Logic ---
let state = 'menu', player, competitors = [], obs, coins, lines, coinCount, lives, elapsed, altitude, shake = 0, keys, groundY;
let gameDiff = 1, startAlt = 100000;
let targetX = W/2;

function setupMenu() {
    state = 'menu';
    OV.style.display = 'flex';
    GFS.innerHTML = `
        <div style="font-size:24px; color:#f0c040; margin-bottom:15px;">MISSION CONFIG</div>
        
        <div style="margin-bottom:10px;">HEIGHT: 
            <select id="selAlt" style="padding:5px; border-radius:5px;">
                <option value="50000">50km (Short)</option>
                <option value="100000" selected>100km (Standard)</option>
                <option value="250000">250km (Marathon)</option>
            </select>
        </div>

        <div style="margin-bottom:15px;">LEVEL: 
            <select id="selDiff" style="padding:5px; border-radius:5px;">
                <option value="0.7">ROOKIE</option>
                <option value="1" selected>ACE</option>
                <option value="1.8">LEGEND</option>
            </select>
        </div>

        <div style="border-top:1px solid #444; padding-top:10px;">SELECT DIVER</div>
        ${Object.keys(CHARS).map(key => `
            <button class="sel-btn" onclick="preStart('${key}')" style="background:${CHARS[key].color}; color:#000; padding:8px 15px; margin:5px; border-radius:10px; cursor:pointer; font-family:inherit; font-weight:bold;">
                ${key}
            </button>
        `).join('')}
    `;
    BTN.style.display = 'none';
}

function preStart(charKey) {
    startAlt = parseInt(document.getElementById('selAlt').value);
    gameDiff = parseFloat(document.getElementById('selDiff').value);
    startGame(charKey);
}

function startGame(charKey) {
    const config = CHARS[charKey];
    player = new Diver(W/2, -100, config); 
    
    competitors = [
        new Diver(W*0.2, H*0.25, CHARS['BALANCED'], true),
        new Diver(W*0.4, H*0.25, CHARS['TANK'], true),
        new Diver(W*0.6, H*0.25, CHARS['GHOST'], true),
        new Diver(W*0.8, H*0.25, CHARS['BALANCED'], true)
    ];

    obs=[]; coins=[]; lines=[];
    coinCount=0; lives=config.lives; elapsed=0; altitude=startAlt; shake=0; groundY = H + 200;
    keys = { a:false, d:false, w:false, s:false };
    
    state = 'ascending';
    OV.style.display = 'none';
    for(let i=0; i<40; i++) lines.push({x: Math.random()*W, y: Math.random()*H, s: 5+Math.random()*15});
    updateHUD();
    loop();
}

function update() {
    if (player.landed) return;
    elapsed++;
    if (shake > 0) shake *= 0.85;

    // Shift the "Strive Point" randomly
    if (elapsed % 120 === 0) targetX = 80 + Math.random() * (W-160);

    if (state === 'ascending') {
        player.y += 2;
        if (player.y >= H * 0.25) state = 'play';
    }

    if (state === 'play') {
        player.speedMult = keys.w ? 0.4 : (keys.s ? 2.8 : 1.2);
        altitude -= (15 * player.speedMult);
        player.update(targetX, obs);
        
        competitors.forEach(c => c.update(targetX, obs));

        if (altitude <= 0) { altitude = 0; handleLanding(); }

        // Adjusted spawn rate by Difficulty
        if (elapsed % Math.max(10, Math.floor(35 / (player.speedMult * gameDiff))) === 0) spawnObstacle();
        
        obs.forEach(o => {
            o.y -= (7 * player.speedMult);
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + 12) {
                lives--; shake = 20; o.y = -1000;
                if (lives <= 0) showOver("CRITICAL FAILURE");
            }
        });

        coins.forEach(c => {
            c.y -= (6 * player.speedMult);
            if (Math.hypot(player.x - c.x, player.y - c.y) < 25) {
                coinCount++; c.y = -1000;
            }
        });
        if (elapsed % 70 === 0 && altitude > 1000) coins.push({x: Math.random()*W, y: H+50});
    }
    updateHUD();
}

function handleLanding() {
    groundY -= 4;
    if (groundY <= player.y + 30) {
        player.landed = true;
        competitors.forEach(c => { c.landed = true; c.y = player.y; });
        setTimeout(() => showOver("TOUCHDOWN SUCCESSFUL"), 1000);
    }
}

function draw() {
    CX.save();
    if (shake > 0.5) CX.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    CX.fillStyle = getAtmosphereColor();
    CX.fillRect(0,0,W,H);

    // Target Visual (The line everyone wants to be on)
    CX.strokeStyle = 'rgba(240, 192, 64, 0.15)';
    CX.setLineDash([10, 10]);
    CX.beginPath(); CX.moveTo(targetX, 0); CX.lineTo(targetX, H); CX.stroke();
    CX.setLineDash([]);

    // Lines
    CX.strokeStyle = 'rgba(255,255,255,0.3)';
    lines.forEach(l => { 
        if (state === 'play') l.y -= (l.s * player.speedMult);
        if (l.y < -50) { l.y = H + 50; l.x = Math.random()*W; }
        CX.beginPath(); CX.moveTo(l.x, l.y); CX.lineTo(l.x, l.y + l.s*2); CX.stroke(); 
    });

    if (altitude < 5000) {
        CX.fillStyle = '#2d4d1a'; CX.fillRect(0, groundY, W, H);
    }

    obs.forEach(o => {
        CX.fillStyle = o.type === 'boulder' ? '#555' : '#f44';
        CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, Math.PI*2); CX.fill();
        CX.strokeStyle = '#000'; CX.lineWidth = 2; CX.stroke();
    });

    coins.forEach(c => { 
        CX.save(); CX.translate(c.x, c.y); CX.scale(Math.sin(elapsed * 0.1), 1);
        CX.fillStyle = '#f0c040'; CX.beginPath(); CX.arc(0, 0, 10, 0, Math.PI*2); CX.fill();
        CX.restore();
    });

    competitors.forEach(c => c.draw(CX));
    player.draw(CX);
    CX.restore();
}

function getAtmosphereColor() {
    if (altitude > 80000) return '#000';
    if (altitude > 40000) return '#001a33';
    return '#87ceeb';
}

function spawnObstacle() {
    if (altitude < 2000) return;
    obs.push({type: 'boulder', x: Math.random()*W, y: H+50, r: 15+Math.random()*15});
}

function showOver(msg) { 
    state = 'menu';
    OV.style.display='flex'; BTN.style.display='block';
    GFS.innerHTML = `<div class="gtitle" style="font-size:30px">${msg}</div><br>COINS COLLECTED: ${coinCount}`;
    BTN.textContent = "RE-CONFIGURE";
}

function updateHUD() {
    LV.textContent = '★'.repeat(Math.max(0, lives));
    CN.textContent = coinCount;
    ALT.textContent = Math.floor(altitude/1000);
}

function loop(){ 
    update(); 
    draw(); 
    if(state !== 'menu') requestAnimationFrame(loop); 
}

BTN.addEventListener('click', setupMenu);
window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

setupMenu();
</script>
</body>
</html>
