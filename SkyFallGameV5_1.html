<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Fredoka One', cursive; 
            color: #fff; 
            overflow: hidden;
            position: fixed; /* Prevents bounce scrolling on iOS */
            width: 100%;
        }
        #ghud { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 95%; 
            max-width: 460px; 
            margin-bottom: 8px; 
            font-size: 14px; 
            text-shadow: 2px 2px 4px #000; 
            z-index: 20; 
        }
        #gc { position: relative; width: 95%; max-width: 460px; height: 75vh; max-height: 600px; }
        canvas#g { 
            display: block; 
            width: 100%; 
            height: 100%; 
            border: 3px solid #444; 
            border-radius: 20px; 
            background: #000; 
        }
        #meru-logo { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            width: 45px; 
            height: 45px; 
            border-radius: 10px; 
            border: 2px solid #6abb30; 
            z-index: 15; 
            opacity: 0.8; 
        }
        #gov { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.85); 
            z-index: 30; 
            border-radius: 18px; 
        }
        .gtitle { font-size: 40px; color: #f0c040; -webkit-text-stroke: 1px #7a5010; margin-bottom: 5px; }
        #gbtn { 
            padding: 16px 45px; 
            background: #3a8820; 
            border: none; 
            border-bottom: 4px solid #225510; 
            color: #fff; 
            border-radius: 30px; 
            font-size: 20px; 
            cursor: pointer; 
        }
        .stat-val { color: #f0c040; }
        #ctrl-hint { 
            font-size: 12px; 
            color: rgba(255,255,255,0.6); 
            margin-top: 10px; 
            text-align: center;
        }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALT: <b id="alt" class="stat-val">100</b>km</span>
    <span>COINS: <b id="cn" class="stat-val">0</b></span>
    <span>LIVES: <b id="lv" class="stat-val">★★★★★</b></span>
</div>

<div id="gc">
    <img src="https://via.placeholder.com/50x50/6abb30/ffffff?text=M" id="meru-logo" alt="Meru Games">
    <canvas id="g"></canvas>
    <div id="gov">
        <div id="msg-box" style="text-align:center; padding: 20px;">
            <div class="gtitle">SKYFALL</div>
            <div id="gfs" style="color:#fff; font-size: 16px; margin-bottom:15px;">Dodge obstacles from space to earth.</div>
            <button id="gbtn">START MISSION</button>
            <div id="ctrl-hint">TAP SIDES TO MOVE<br>TAP CENTER TO DIVE</div>
        </div>
    </div>
</div>

<script>
    const CV = document.getElementById('g'), CX = CV.getContext('2d');
    const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn');
    const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), LV = document.getElementById('lv'), GFS = document.getElementById('gfs');

    let W, H;
    let state = 'menu', player, obs, vortexes, coins, lines, coinCount, lives, elapsed, altitude, shake = 0, keys, groundY;

    function resize() {
        const container = document.getElementById('gc');
        W = CV.width = container.offsetWidth;
        H = CV.height = container.offsetHeight;
        groundY = H + 200;
    }

    window.addEventListener('resize', resize);
    resize();

    function init() {
        player = { x:W/2, y:H*0.25, vx:0, speedMult:1, legSwing:0, w:1, h:1, landed: false };
        obs=[]; vortexes=[]; coins=[]; lines=[];
        coinCount=0; lives=5; elapsed=0; altitude=100000; shake=0; groundY = H + 200;
        keys = { a:false, d:false, w:false, s:false };
        OV.style.display = 'none';
        state = 'play';
        updateHUD();
        for(let i=0; i<30; i++) lines.push({x: Math.random()*W, y: Math.random()*H, s: 5+Math.random()*15});
    }

    function updateHUD() {
        LV.textContent = '★'.repeat(Math.max(0, lives));
        CN.textContent = coinCount;
        ALT.textContent = Math.floor(altitude/1000);
    }

    function getAtmosphereColor() {
        if (altitude > 80000) return '#000000';
        if (altitude > 50000) {
            let p = (altitude - 50000) / 30000;
            return `rgb(0, ${Math.floor(15 * (1-p))}, ${Math.floor(50 * (1-p))})`;
        }
        if (altitude > 10000) {
            let p = (altitude - 10000) / 40000;
            return `rgb(${Math.floor(40 * (1-p))}, ${Math.floor(120 * (1-p))}, ${Math.floor(255 * (1-p))})`;
        }
        return `#87ceeb`; 
    }

    // Touch Controls
    CV.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touchX = e.touches[0].clientX - CV.getBoundingClientRect().left;
        const part = W / 3;
        if (touchX < part) keys.a = true;
        else if (touchX > part * 2) keys.d = true;
        else keys.s = true;
    });

    CV.addEventListener('touchend', (e) => {
        keys.a = keys.d = keys.s = false;
    });

    function spawnObstacle() {
        if (altitude < 2000) return;
        const typeRoll = Math.random();
        if (typeRoll < 0.5) obs.push({type: 'boulder', x: Math.random()*W, y: H+50, r: 15+Math.random()*15, vx: 0});
        else if (typeRoll < 0.8) obs.push({type: 'satellite', x: Math.random()*W, y: H+50, r: 10, vx: (Math.random()-0.5)*3});
        else obs.push({type: 'storm', x: Math.random()*W, y: H+50, r: 25});
    }

    function update() {
        if (player.landed) return;
        elapsed++;
        if (shake > 0) shake *= 0.85;
        
        player.speedMult = keys.s ? 2.5 : 1.2;
        
        if (altitude > 0) {
            altitude -= (20 * player.speedMult);
            if (keys.a) player.vx -= 0.8;
            if (keys.d) player.vx += 0.8;
            player.vx *= 0.86;
            player.x += player.vx;
            player.x = Math.max(25, Math.min(W-25, player.x));
            player.legSwing += 0.2 * player.speedMult;
        } else {
            altitude = 0;
            groundY -= 5;
            if (groundY <= player.y + 35) {
                player.landed = true;
                setTimeout(() => showOver("TOUCHDOWN SUCCESSFUL!"), 1000);
            }
        }

        // Object movement
        obs.forEach(o => {
            o.y -= (7 * player.speedMult);
            if (o.type === 'satellite') o.x += o.vx;
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + 12) {
                lives--; shake = 15; o.y = -500;
                updateHUD();
                if (lives <= 0) showOver("RE-ENTRY FAILED");
            }
        });

        vortexes.forEach(v => {
            v.y -= (6 * player.speedMult);
            if (Math.hypot(player.x - v.x, player.y - v.y) < v.r) {
                player.vx = (player.x < v.x ? -25 : 25);
                shake = 10; v.y = -500;
            }
        });

        coins.forEach(c => {
            c.y -= (6 * player.speedMult);
            if (Math.hypot(player.x - c.x, player.y - c.y) < 25) {
                coinCount++; updateHUD(); c.y = -500;
            }
        });

        if (elapsed % 45 === 0) spawnObstacle();
        if (elapsed % 180 === 0 && altitude > 3000) vortexes.push({x: Math.random()*W, y: H+50, r: 35});
        if (elapsed % 80 === 0 && altitude > 2000) coins.push({x: Math.random()*W, y: H+50});

        updateHUD();
    }

    function draw() {
        CX.save();
        if (shake > 0.5) CX.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        CX.fillStyle = getAtmosphereColor();
        CX.fillRect(0,0,W,H);

        // Ground
        if (altitude < 5000) {
            CX.fillStyle = '#4a7c2c';
            CX.fillRect(0, groundY, W, H);
        }

        // Hazards
        obs.forEach(o => {
            CX.fillStyle = o.type === 'boulder' ? '#555' : (o.type === 'satellite' ? '#aaa' : '#f44');
            CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, Math.PI*2); CX.fill();
        });

        // Coins
        CX.fillStyle = '#f0c040';
        coins.forEach(c => { CX.beginPath(); CX.arc(c.x, c.y, 8, 0, Math.PI*2); CX.fill(); });

        drawDiver();
        CX.restore();
    }

    function drawDiver() {
        CX.save(); CX.translate(player.x, player.y);
        if (player.landed) {
            CX.strokeStyle = '#fff'; CX.lineWidth = 3;
            CX.beginPath(); CX.arc(0, -35, 6, 0, Math.PI*2); CX.stroke();
            CX.beginPath(); CX.moveTo(0, -29); CX.lineTo(0, -10); CX.stroke();
            CX.beginPath(); CX.moveTo(-10, -20); CX.lineTo(10, -20); CX.stroke();
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(-7, 5); CX.stroke();
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(7, 5); CX.stroke();
        } else {
            let s = keys.s ? 1.4 : 1;
            CX.scale(1/s, s);
            CX.rotate(player.vx * 0.08);
            CX.strokeStyle = keys.s ? '#ff0' : '#fff'; CX.lineWidth = 3;
            CX.beginPath(); CX.arc(0, 15, 6, 0, Math.PI*2); CX.stroke();
            CX.beginPath(); CX.moveTo(0, 10); CX.lineTo(0, -10); CX.stroke();
            CX.beginPath(); CX.moveTo(-12, 0); CX.lineTo(12, 0); CX.stroke();
            let k = Math.sin(player.legSwing) * 10;
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(-5, -20+k); CX.stroke();
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(5, -20-k); CX.stroke();
        }
        CX.restore();
    }

    function showOver(msg) { 
        state = 'menu';
        OV.style.display='flex'; GFS.innerHTML = `${msg}<br>COINS: ${coinCount}`;
        BTN.textContent = "RE-TRY MISSION";
    }

    BTN.addEventListener('click', init);
    
    // Keyboard fallback
    window.addEventListener('keydown', e => {
        if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
        if (e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
        if (e.key === 's' || e.key === 'ArrowDown') keys.s = true;
    });
    window.addEventListener('keyup', e => {
        keys.a = keys.d = keys.s = false;
    });

    (function loop(){ if(state==='play') update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
