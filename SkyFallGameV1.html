<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFall — Free-Fall Gauntlet</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        /* General Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a0f08;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            color: #c8a96e;
            overflow: hidden; /* Prevents scrolling during play */
        }

        #ghud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 460px;
            padding: 0 10px;
            margin-bottom: 8px;
            font-size: 15px;
            color: #8b6340;
            letter-spacing: 0.04em;
        }

        #ghud span b {
            color: #f0c040;
            -webkit-text-stroke: 1px #7a5010;
            text-shadow: 2px 2px 0px #5a3a08;
        }

        /* Responsive Canvas Container */
        #gc { 
            position: relative; 
            width: 95%; 
            max-width: 460px; 
        }

        canvas#g {
            display: block;
            width: 100%;
            height: auto;
            border: 4px solid #5a3a10;
            border-radius: 16px;
            outline: 2px solid #3a2008;
            background: #1a0f08;
        }

        /* UI Overlays */
        #gov {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 12px;
            background: rgba(15,8,2,0.87);
            z-index: 10;
        }

        .gtitle {
            font-size: 52px;
            color: #f0c040;
            -webkit-text-stroke: 3px #7a5010;
            text-shadow: 4px 4px 0px #3a2008, 0px 0px 20px rgba(80,180,40,0.4);
            letter-spacing: 0.08em;
            line-height: 1;
        }

        .gsub {
            font-size: 13px;
            color: #6daa30;
            letter-spacing: 0.12em;
            text-align: center;
        }

        .gfin {
            font-size: 22px;
            color: #f0c040;
            -webkit-text-stroke: 1.5px #7a5010;
            text-shadow: 2px 2px 0px #3a2008;
        }

        .gzone {
            font-size: 13px;
            padding: 5px 16px;
            background: rgba(50,25,5,0.8);
            border: 2px solid #5a8820;
            border-radius: 20px;
            color: #aadd50;
            letter-spacing: 0.06em;
        }

        #gbtn {
            padding: 12px 36px;
            background: #3a8820;
            border: 3px solid #6abb30;
            border-bottom: 5px solid #225510;
            color: #ffffff;
            border-radius: 24px;
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            letter-spacing: 0.08em;
            cursor: pointer;
            text-shadow: 1px 1px 0px #1a4408;
            transition: transform 0.08s, border-bottom-width 0.08s;
        }

        #gbtn:hover { background: #4aaa28; transform: translateY(-2px); }
        #gbtn:active { border-bottom-width: 2px; transform: translateY(3px); }

        .gkeys { display: flex; gap: 8px; margin-top: 2px; }

        .gkey {
            padding: 4px 11px;
            background: rgba(40,20,5,0.7);
            border: 1.5px solid #4a6820;
            border-radius: 8px;
            font-size: 11px;
            color: #88bb40;
            letter-spacing: 0.05em;
        }
    </style>

    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const CV = document.getElementById('g');
            const CX = CV.getContext('2d');
            const W = CV.width, H = CV.height;
            const OV = document.getElementById('gov');
            const BTN = document.getElementById('gbtn');
            const SC = document.getElementById('sc');
            const LV = document.getElementById('lv');
            const ZNM = document.getElementById('znm');
            const GFS = document.getElementById('gfs');
            const GZB = document.getElementById('gzb');

            const ZONES = [
                { name:'ZONE 1 — OPEN SKY', bg0:'#1a3a10', speed:2.0, si:100, gapW:115, moveObs:false, wind:false, spikes:false },
                { name:'ZONE 2 — THE CANOPY', bg0:'#2a1a08', speed:3.0, si:72, gapW:100, moveObs:true, wind:true, spikes:false },
                { name:'ZONE 3 — TERMINAL VELOCITY', bg0:'#0a0f04', speed:4.2, si:52, gapW:82, moveObs:true, wind:true, spikes:true }
            ];

            const PR = 13, HR = 9;
            let state = 'menu';
            let player, obs, particles, birds, windZones;
            let score, lives, elapsed, spawnT, shakeF, keys, touchDir, zone, chunkDist, multip;

            function init() {
                player = { x:W/2, y:H*0.16, vx:0, lean:0, squash:1, stretch:1, splat:0, flair:0 };
                obs=[]; particles=[]; birds=[]; windZones=[];
                score=0; lives=3; elapsed=0; spawnT=0; shakeF=0; touchDir=0; zone=0; chunkDist=0; multip=1.0;
                keys={l:false,r:false};
                for(let i=0;i<6;i++) birds.push({x:Math.random()*W,y:Math.random()*H*0.6,vx:(Math.random()-.5)*0.6,wing:0,ws:0.08+Math.random()*0.04});
            }

            function getZone(){ return ZONES[Math.min(zone,ZONES.length-1)]; }

            function spawnObs(){
                const z=getZone();
                const gW=Math.max(80,z.gapW-(elapsed*0.015));
                const gX=PR*2+Math.random()*(W-gW-PR*4);
                const h=24+Math.random()*30;
                obs.push({lx:0,lw:gX,rx:gX+gW,rw:W-(gX+gW),y:H+40,h,speed:z.speed,gX,gW,
                    scored:false,nmDone:false,moving:z.moveObs&&Math.random()<0.45,
                    mvDir:Math.random()<.5?1:-1,mvSpd:0.8+Math.random()*0.6,
                    spikes:z.spikes&&Math.random()<0.4});
            }

            function spawnWind(){
                const z=getZone();
                if(!z.wind)return;
                windZones.push({x:20+Math.random()*(W-80),y:H+60,w:55+Math.random()*50,h:40+Math.random()*30,speed:z.speed,dir:Math.random()<.5?1:-1,t:0});
            }

            function emit(x,y,col,n=8){
                for(let i=0;i<n;i++){
                    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
                    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:0.03+Math.random()*0.03,col,r:1.5+Math.random()*2.5});
                }
            }

            function rr(x,y,w,h,r){
                CX.beginPath();CX.moveTo(x+r,y);CX.lineTo(x+w-r,y);CX.quadraticCurveTo(x+w,y,x+w,y+r);
                CX.lineTo(x+w,y+h-r);CX.quadraticCurveTo(x+w,y+h,x+w-r,y+h);CX.lineTo(x+r,y+h);
                CX.quadraticCurveTo(x,y+h,x,y+h-r);CX.lineTo(x,y+r);CX.quadraticCurveTo(x,y,x+r,y);CX.closePath();
            }

            function drawBg(){
                CX.fillStyle=getZone().bg0; CX.fillRect(0,0,W,H);
                for(let i=0;i<40;i++){
                    const y=(elapsed*0.25*(i%3+1)+i*137)%H;
                    const x=(i*173+Math.sin(elapsed*0.01+i)*12)%W;
                    const sz=1+((i*7)%6)*0.3;
                    CX.globalAlpha=0.1+((i%5)*0.03);
                    CX.fillStyle=i%3===0?'#88cc40':'#c8a060';
                    CX.beginPath(); CX.ellipse(x,y,sz*1.8,sz*0.8,elapsed*0.02+i,0,Math.PI*2); CX.fill();
                }
                CX.globalAlpha=1;
            }

            function drawBirds(){
                birds.forEach(b=>{
                    b.x+=b.vx; b.y-=0.4+getZone().speed*0.15; b.wing+=b.ws;
                    if(b.x<0)b.x=W; if(b.x>W)b.x=0; if(b.y<-10)b.y=H+10;
                    const flap=Math.sin(b.wing)*5;
                    CX.strokeStyle='rgba(100,180,50,0.38)'; CX.lineWidth=1;
                    CX.beginPath(); CX.moveTo(b.x-7,b.y+flap); CX.lineTo(b.x,b.y); CX.lineTo(b.x+7,b.y+flap); CX.stroke();
                });
            }

            function drawWind(wz){
                CX.save();
                CX.globalAlpha=0.2+0.06*Math.sin(wz.t*0.12);
                CX.fillStyle='#60aa20'; rr(wz.x,wz.y-wz.h/2,wz.w,wz.h,6); CX.fill();
                CX.strokeStyle='#88cc40'; CX.lineWidth=1.5; rr(wz.x,wz.y-wz.h/2,wz.w,wz.h,6); CX.stroke();
                CX.globalAlpha=0.8; CX.fillStyle='#ccff60'; CX.font='bold 11px Fredoka One,cursive';
                CX.fillText(wz.dir>0?'>> WIND >>':'<< WIND <<',wz.x+6,wz.y+4);
                CX.restore();
            }

            function drawObs(o){
                const isZ3=getZone().name.includes('3');
                const fill=isZ3?'#3a1a05':'#5a2f0a', top=isZ3?'#4a2a08':'#7a4515', rim=isZ3?'#88cc30':'#6aa820';
                [{x:o.lx,w:o.lw},{x:o.rx,w:o.rw}].forEach(seg=>{
                    if(seg.w<=0)return;
                    CX.fillStyle=fill; rr(seg.x,o.y-o.h/2,seg.w,o.h,4); CX.fill();
                    CX.fillStyle=top;  rr(seg.x+1,o.y-o.h/2+1,seg.w-2,o.h*0.35,3); CX.fill();
                    CX.strokeStyle=rim; CX.lineWidth=2; rr(seg.x,o.y-o.h/2,seg.w,o.h,4); CX.stroke();
                });
            }

            function drawStickman(px,py,lean,sq,st,splat,flair){
                CX.save();
                CX.translate(px,py); CX.rotate(lean*0.4); CX.scale(1/Math.max(0.5,sq),sq);
                CX.lineCap='round'; CX.lineJoin='round';
                CX.beginPath(); CX.arc(0,-PR-4,PR*0.78,0,Math.PI*2);
                CX.fillStyle='#5acc20'; CX.fill();
                CX.strokeStyle='#2a6008'; CX.lineWidth=2.5; CX.stroke();
                CX.fillStyle='#1a4008';
                CX.beginPath(); CX.arc(-3.5,-PR-4,1.5,0,Math.PI*2); CX.fill();
                CX.beginPath(); CX.arc(3.5,-PR-4,1.5,0,Math.PI*2); CX.fill();
                const bodyLen=PR*1.2*st;
                CX.strokeStyle='#2a6008'; CX.lineWidth=2.5;
                CX.beginPath(); CX.moveTo(0,-PR*0.3); CX.lineTo(0,bodyLen); CX.stroke();
                CX.restore();
            }

            function update(){
                elapsed++;
                const z=getZone();
                chunkDist+=z.speed;
                if(chunkDist>2000){chunkDist=0;zone=Math.min(zone+1,ZONES.length-1);updateZoneUI();}
                multip=Math.max(1,multip-0.004);
                const dir=(keys.l?-1:0)+(keys.r?1:0)+touchDir;
                player.vx+=dir*0.4; player.vx*=0.86;
                player.x+=player.vx; player.x=Math.max(PR,Math.min(W-PR,player.x));
                player.lean+=(dir-player.lean)*0.18;
                spawnT++;
                if(spawnT>=z.si){spawnT=0;spawnObs();if(z.wind&&Math.random()<0.3)spawnWind();}
                obs.forEach(o=>{ o.y-=o.speed; });
                obs=obs.filter(o=>o.y>-80);
                windZones.forEach(wz=>{wz.y-=wz.speed;wz.t++;});
                windZones=windZones.filter(wz=>wz.y>-80);
                particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.dec;});
                particles=particles.filter(p=>p.life>0);
                if(state==='play')checkColl();
                score+=Math.round(z.speed*0.06);
                SC.textContent=score;
                if(shakeF>0)shakeF--;
            }

            function checkColl(){
                const px=player.x,py=player.y;
                for(let o of obs){
                    if(py+HR<o.y-o.h/2||py-HR>o.y+o.h/2)continue;
                    if(px-HR<o.lw||px+HR>o.rx){
                        lives--; LV.textContent='★'.repeat(Math.max(0,lives))+'☆'.repeat(Math.max(0,3-lives));
                        shakeF=20; player.vx*=-0.7;
                        emit(px,py,'rgba(255,120,20,.9)',14); o.y=-9999;
                        if(lives<=0){state='dead';showOver();} return;
                    }
                }
                windZones.forEach(wz=>{if(Math.abs(py-wz.y)<wz.h/2&&px>wz.x&&px<wz.x+wz.w)player.vx+=wz.dir*0.9;});
            }

            function draw(){
                CX.save();
                if(shakeF>0){const s=shakeF>12?4:2;CX.translate((Math.random()-.5)*s,(Math.random()-.5)*s);}
                drawBg(); drawBirds();
                windZones.forEach(drawWind); obs.forEach(drawObs);
                particles.forEach(p=>{CX.save();CX.globalAlpha=p.life;CX.fillStyle=p.col;CX.beginPath();CX.arc(p.x,p.y,p.r,0,Math.PI*2);CX.fill();CX.restore();});
                drawStickman(player.x,player.y,player.lean,player.squash,player.stretch,player.splat,player.flair);
                CX.restore();
            }

            function updateZoneUI(){const z=getZone();ZNM.textContent=z.name.split('—')[0].trim();GZB.textContent=z.name;}
            function showOver(){OV.style.display='flex';GFS.style.display='block';GFS.textContent='SCORE: '+score+'!';BTN.textContent='PLAY AGAIN!';}

            (function loop(){if(state==='play')update();draw();requestAnimationFrame(loop);})();

            BTN.addEventListener('click',()=>{init();state='play';OV.style.display='none';GFS.style.display='none';updateZoneUI();});
            document.addEventListener('keydown',e=>{
                if(['ArrowLeft','a','A'].includes(e.key))keys.l=true;
                if(['ArrowRight','d','D'].includes(e.key))keys.r=true;
            });
            document.addEventListener('keyup',e=>{
                if(['ArrowLeft','a','A'].includes(e.key))keys.l=false;
                if(['ArrowRight','d','D'].includes(e.key))keys.r=false;
            });

            CV.addEventListener('touchstart',e=>{
                const r=CV.getBoundingClientRect();
                touchDir=(e.touches[0].clientX-r.left < r.width/2)?-1:1;
                e.preventDefault();
            },{passive:false});
            CV.addEventListener('touchend',()=>{touchDir=0;});
        });
    </script>
</head>
<body>

<div id="ghud">
    <span>SCORE <b id="sc">0</b></span>
    <span id="znm">ZONE 1</span>
    <span>LIVES <b id="lv">★★★</b></span>
</div>

<div id="gc">
    <canvas id="g" width="460" height="560"></canvas>
    <div id="gov">
        <div class="gtitle">SKYFALL</div>
        <div class="gsub">FREE-FALL GAUNTLET</div>
        <div id="gfs" class="gfin" style="display:none"></div>
        <div class="gzone" id="gzb">ZONE 1 — THE OPEN SKY</div>
        <button id="gbtn">PLAY NOW!</button>
        <div class="gsub" style="margin-top:2px">close calls score big!</div>
        <div class="gkeys">
            <span class="gkey">A / ← left</span>
            <span class="gkey">D / → right</span>
        </div>
    </div>
</div>

</body>
</html>
