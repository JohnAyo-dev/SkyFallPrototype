<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall: Rank Chase — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; }

        #ghud {
            display: flex; justify-content: space-between; align-items: center;
            width: 95%; max-width: 460px; margin-bottom: 8px;
            font-size: 13px; text-shadow: 2px 2px 4px #000; z-index: 20;
        }
        #ghud span { background: rgba(0,0,0,0.45); border: 2px solid #444; border-radius: 10px; padding: 4px 10px; }
        #target-rank-display { color: #f0c040; font-weight: bold; border-color: #f0c040 !important; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #gc { position: relative; width: 95%; max-width: 460px; }
        canvas#g { display: block; width: 100%; height: auto; border: 3px solid #444; border-radius: 20px; background: #000; }

        #race-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.6); border: 2px solid #555;
            border-radius: 10px; padding: 6px 10px;
            font-size: 11px; z-index: 15; min-width: 90px;
            display: none;
        }
        .rp-title { color: #f0c040; font-size: 10px; margin-bottom: 3px; }

        #gov {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.88); z-index: 30; border-radius: 18px;
        }
        .gtitle { font-size: 52px; color: #f0c040; -webkit-text-stroke: 2px #7a5010; margin-bottom: 8px; }
        #gbtn {
            padding: 14px 40px; background: #3a8820; border: none; border-bottom: 4px solid #225510;
            color: #fff; border-radius: 30px; font-size: 22px; cursor: pointer; font-family: 'Fredoka One', cursive;
        }
        .sel-btn {
            font-family: 'Fredoka One', cursive; font-size: 14px; border-radius: 8px;
            background: #1a1a2e; color: #fff; border: 2px solid #555; padding: 10px; margin: 5px; cursor: pointer;
        }

        #touch-ctrl {
            display: none; position: absolute; bottom: 15px; left: 0; width: 100%;
            justify-content: space-between; padding: 0 20px; z-index: 20;
        }
        .tc-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff3; display: flex; align-items: center; justify-content: center; }
        @media (pointer: coarse) { #touch-ctrl { display: flex; } }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALT: <b id="alt" style="color:#f0c040">100</b>km</span>
    <span id="target-rank-display">GOAL: <b id="goal-rank">1st</b></span>
    <span>⬤ COINS: <b id="cn" style="color:#f0c040">0</b></span>
</div>

<div id="gc">
    <div id="race-panel">
        <div class="rp-title">🏁 STANDINGS</div>
        <div id="rp-list"></div>
    </div>
    <canvas id="g" width="460" height="600"></canvas>
    <div id="touch-ctrl">
        <div class="tc-btn" id="tc-left">◀</div>
        <div class="tc-btn" id="tc-right">▶</div>
    </div>
    <div id="gov">
        <div id="msg-box" style="text-align:center; padding: 20px;">
            <div class="gtitle">SKYFALL</div>
            <div id="gfs" style="color:#fff; font-size: 17px; margin-bottom:18px;"></div>
            <button id="gbtn">START MISSION</button>
        </div>
    </div>
</div>

<script>
const CV = document.getElementById('g'), CX = CV.getContext('2d');
const W = CV.width, H = CV.height;
const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn');
const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), GOAL_TXT = document.getElementById('goal-rank');
const RPANEL = document.getElementById('race-panel'), RPLIST = document.getElementById('rp-list');

const CHARS = {
    'ACE': { color: '#ffffff', speed: 1.2, drift: 0.9, info: "Balanced" },
    'HEAVY': { color: '#ff5555', speed: 1.8, drift: 0.5, info: "Fast, Hard to steer" },
    'NEON': { color: '#00ffff', speed: 0.8, drift: 1.6, info: "Slow, Very agile" }
};

const AI_NAMES = ['VULCAN', 'STRIDER', 'ORION', 'COBALT', 'PHANTOM'];
let currentGoalRank = 1; 

class Diver {
    constructor(x, y, config, name, isAI = false) {
        this.x = x; this.y = y; this.config = config; this.name = name; this.isAI = isAI;
        this.vx = 0; this.vy = 0; this.stun = 0;
        this.legSwing = 0; this.landed = false;
        this.speedMult = 1;
    }

    update(obstacles, leaderboard, playerSpeed) {
        if (this.landed) return;
        if (this.stun > 0) { this.stun--; this.speedMult = 0.3; } else { this.speedMult = 1; }

        if (this.isAI) {
            // AI Logic: Find where they are in X-axis vs others
            let myRank = leaderboard.findIndex(d => d === this) + 1;
            let targetX = this.x;

            if (myRank < currentGoalRank) targetX = W; // Too far left, move right
            if (myRank > currentGoalRank) targetX = 0; // Too far right, move left
            
            // Basic Obstacle Avoidance
            obstacles.forEach(o => {
                if (Math.abs(o.x - this.x) < 40 && Math.abs(o.y - this.y) < 100) {
                    targetX = o.x > this.x ? this.x - 50 : this.x + 50;
                }
            });

            let diff = targetX - this.x;
            this.vx += diff * 0.01 * this.config.drift;
            this.vx *= 0.9;
            this.y += (this.config.speed * playerSpeed * 0.5);
            if (this.y > H - 100) this.y -= 2;
            if (this.y < 100) this.y += 2;
        } else {
            if (keys.a || keys.ArrowLeft) this.vx -= this.config.drift;
            if (keys.d || keys.ArrowRight) this.vx += this.config.drift;
            this.vx *= 0.85;
        }

        this.x += this.vx;
        this.x = Math.max(20, Math.min(W - 20, this.x));
        this.legSwing += 0.2;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.stun > 0) ctx.filter = 'grayscale(1) brightness(2)';
        ctx.strokeStyle = this.config.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke(); // Head
        ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(0, 25); ctx.stroke(); // Body
        let k = Math.sin(this.legSwing) * 10;
        ctx.beginPath(); ctx.moveTo(0, 25); ctx.lineTo(-8, 40+k); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 25); ctx.lineTo(8, 40-k); ctx.stroke();
        ctx.fillStyle = this.config.color; ctx.font = '10px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.name, 0, -15);
        ctx.restore();
    }
}

let player, competitors = [], obs = [], coins = [], lines = [];
let altitude, coinCount, state = 'menu', animId, keys = {};

function setupMenu() {
    state = 'menu'; OV.style.display = 'flex'; RPANEL.style.display = 'none';
    let html = `<div style="margin-bottom:20px">CHOOSE YOUR SUIT</div>`;
    Object.keys(CHARS).forEach(k => {
        html += `<button class="sel-btn" onclick="startGame('${k}')">${k}<br><small>${CHARS[k].info}</small></button>`;
    });
    GFS.innerHTML = html;
    BTN.style.display = 'none';
}

function startGame(key) {
    player = new Diver(W/2, 150, CHARS[key], 'YOU');
    competitors = AI_NAMES.map((n, i) => new Diver(50 + i*70, 200 + i*30, CHARS['ACE'], n, true));
    altitude = 100000; coinCount = 0; obs = []; coins = []; state = 'play';
    OV.style.display = 'none'; RPANEL.style.display = 'block';
    currentGoalRank = Math.floor(Math.random() * 6) + 1;
    updateGoalUI();
    loop();
}

function updateGoalUI() {
    let suffix = ["th", "st", "nd", "rd"][currentGoalRank] || "th";
    if (currentGoalRank >= 11 && currentGoalRank <= 13) suffix = "th";
    GOAL_TXT.textContent = currentGoalRank + suffix;
}

function loop() {
    CX.fillStyle = altitude > 20000 ? '#000005' : '#1a5c9a';
    CX.fillRect(0, 0, W, H);

    // Leaderboard logic (Sorted by X position)
    let all = [player, ...competitors].sort((a, b) => a.x - b.x);
    
    // Altitude & Target Switching
    if (state === 'play') {
        altitude -= 100;
        if (altitude % 10000 === 0 && altitude > 10000) {
            currentGoalRank = Math.floor(Math.random() * 6) + 1;
            updateGoalUI();
        }
        
        // 10KM SPRINT
        if (altitude <= 10000 && altitude > 0) {
            CX.fillStyle = 'rgba(255, 0, 0, 0.1)';
            CX.fillRect(0, 0, W, H);
            if (Math.random() > 0.95) currentGoalRank = currentGoalRank; // Lock rank
        }

        if (altitude <= 0) {
            state = 'over';
            let finalRank = all.findIndex(d => d === player) + 1;
            let win = finalRank === currentGoalRank;
            showGameOver(win, finalRank);
        }

        // Spawning
        if (Math.random() > 0.97) obs.push({x: Math.random()*W, y: H+50, r: 15+Math.random()*15});
        
        player.update(obs, all, 1);
        competitors.forEach(c => c.update(obs, all, 1));

        // Collisions
        obs.forEach(o => {
            o.y -= 8;
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + 10) {
                player.stun = 90; // 1.5 seconds at 60fps
                o.y = -500;
            }
        });
        obs = obs.filter(o => o.y > -100);
    }

    all.forEach(d => d.draw(CX));
    updateRacePanel(all);
    ALT.textContent = Math.max(0, Math.floor(altitude/1000));
    
    if (state !== 'over') requestAnimationFrame(loop);
}

function updateRacePanel(list) {
    RPLIST.innerHTML = list.map((d, i) => {
        let rank = i + 1;
        let isGoal = rank === currentGoalRank ? '▶ ' : '';
        return `<div style="color:${d.config.color}; font-weight:${d === player ? 'bold' : 'normal'}">
            ${isGoal}${rank}. ${d.name}
        </div>`;
    }).join('');
}

function showGameOver(win, rank) {
    OV.style.display = 'flex';
    BTN.style.display = 'block';
    BTN.textContent = "TRY AGAIN";
    let msg = win ? "MISSION SUCCESS" : "MISSION FAILED";
    let color = win ? "#4dff88" : "#ff5555";
    GFS.innerHTML = `<h2 style="color:${color}">${msg}</h2>
        <p>Target Rank was: ${currentGoalRank}</p>
        <p>Your Final Rank: ${rank}</p>`;
}

BTN.addEventListener('click', setupMenu);
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);
document.getElementById('tc-left').ontouchstart = () => keys.a = true;
document.getElementById('tc-left').ontouchend = () => keys.a = false;
document.getElementById('tc-right').ontouchstart = () => keys.d = true;
document.getElementById('tc-right').ontouchend = () => keys.d = false;

setupMenu();
</script>
</body>
</html>
