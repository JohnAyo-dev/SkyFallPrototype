<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0a0a14;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            font-family: 'Fredoka One', cursive;
            color: #fff; overflow: hidden;
        }

        #ghud {
            display: flex; justify-content: space-between; align-items: center;
            width: 95%; max-width: 460px; margin-bottom: 8px;
            font-size: 13px; z-index: 20;
        }
        #ghud span {
            background: rgba(0,0,0,0.55);
            border: 2px solid #333; border-radius: 10px;
            padding: 4px 10px;
            text-shadow: 1px 1px 3px #000;
        }

        #gc { position: relative; width: 95%; max-width: 460px; }
        canvas#g {
            display: block; width: 100%; height: auto;
            border: 3px solid #2a2a3e; border-radius: 20px; background: #000;
        }

        #race-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.7); border: 2px solid #444;
            border-radius: 10px; padding: 6px 10px;
            font-size: 11px; z-index: 15; min-width: 90px;
            max-height: 220px; overflow-y: auto;
            display: none;
        }
        #race-panel .rp-title { color: #f0c040; font-size: 10px; margin-bottom: 3px; }
        .rp-entry { margin: 2px 0; }

        #target-rank-badge {
            position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 2px solid #f0c040;
            border-radius: 12px; padding: 5px 14px;
            font-size: 13px; z-index: 15; text-align: center;
            display: none; white-space: nowrap;
        }

        #gov {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.92); z-index: 30; border-radius: 18px;
        }
        .gtitle {
            font-size: 52px; color: #f0c040;
            -webkit-text-stroke: 2px #7a5010;
            margin-bottom: 6px; letter-spacing: 3px;
        }
        .gsubtitle { font-size: 13px; color: #888; letter-spacing: 4px; margin-bottom: 20px; }

        #gbtn {
            padding: 14px 40px; background: #3a8820;
            border: none; border-bottom: 4px solid #225510;
            color: #fff; border-radius: 30px; font-size: 22px;
            cursor: pointer; font-family: 'Fredoka One', cursive;
            transition: transform 0.1s; margin-top: 14px;
        }
        #gbtn:active { transform: scale(0.96) translateY(3px); border-bottom-width: 1px; }

        select, .sel-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 15px; border-radius: 8px;
            background: #1a1a2e; color: #fff;
            border: 2px solid #444; padding: 5px 10px; cursor: pointer;
        }
        .sel-btn {
            padding: 10px 18px; margin: 5px;
            transition: transform 0.1s, border-color 0.2s;
        }
        .sel-btn:hover { transform: scale(1.05); border-color: #f0c040; }
        .sel-btn.active-suit { border-color: #f0c040 !important; box-shadow: 0 0 10px rgba(240,192,64,0.4); }

        #touch-ctrl {
            display: none;
            position: absolute; bottom: 15px; left: 0; width: 100%;
            justify-content: space-between; padding: 0 20px; z-index: 20;
        }
        .tc-btn {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.12); border: 3px solid rgba(255,255,255,0.3);
            font-size: 22px; color: #fff;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
        }
        @media (pointer: coarse) { #touch-ctrl { display: flex; } }

        #speed-bar-wrap {
            position: absolute; bottom: 90px; right: 12px;
            display: none; flex-direction: column;
            align-items: center; gap: 3px; z-index: 15;
        }
        #speed-bar-label { font-size: 9px; color: #888; }
        #speed-bar-outer {
            width: 10px; height: 70px;
            background: rgba(0,0,0,0.5); border: 1px solid #333;
            border-radius: 5px; overflow: hidden;
            display: flex; align-items: flex-end;
        }
        #speed-bar-inner { width: 100%; background: #4dff88; border-radius: 5px; transition: height 0.2s, background 0.3s; }

        #announce-overlay {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 35; border-radius: 18px;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: none;
        }

        /* Ghost mode preview */
        #ghost-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,200,255,0.08); border: 2px dashed rgba(0,200,255,0.3);
            border-radius: 12px; padding: 8px 16px;
            font-size: 11px; color: rgba(0,200,255,0.6);
            letter-spacing: 2px; display: none; z-index: 14; white-space: nowrap;
        }

        .stat-val { color: #f0c040; }

        /* Hover prestart buttons */
        .mode-btn {
            padding: 10px 24px; margin: 5px; border-radius: 20px;
            border: 2px solid #555; background: transparent;
            font-family: 'Fredoka One', cursive; font-size: 16px;
            color: #fff; cursor: pointer; transition: all 0.2s;
        }
        .mode-btn:hover { border-color: #f0c040; color: #f0c040; }
        .mode-btn.selected { background: rgba(240,192,64,0.15); border-color: #f0c040; color: #f0c040; }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALT: <b id="alt" class="stat-val">100</b>km</span>
    <span>⬤ COINS: <b id="cn" class="stat-val">0</b></span>

<div id="gc">
    <div id="race-panel">
        <div class="rp-title">🏁 RACE</div>
        <div id="rp-aim" style="color:#f0c040; font-size:11px; margin-bottom:4px; border-bottom:1px solid #333; padding-bottom:3px;"></div>
        <div id="rp-list"></div>
    </div>

    <div id="target-rank-badge"></div>

    <div id="ghost-hint">GHOST MODE — BLIND FALL</div>

    <div id="speed-bar-wrap">
        <div id="speed-bar-label">SPEED</div>
        <div id="speed-bar-outer"><div id="speed-bar-inner" style="height:60%"></div></div>
    </div>

    <div id="announce-overlay">
        <div style="font-size:13px; color:#666; letter-spacing:4px; margin-bottom:10px;">YOUR MISSION</div>
        <div style="font-size:18px; color:#aaa; margin-bottom:6px;">FINISH IN POSITION</div>
        <div id="announce-rank" style="font-size:100px; color:#f0c040; -webkit-text-stroke:3px #7a5010; line-height:1; margin-bottom:2px;"></div>
        <div id="announce-suffix" style="font-size:30px; color:#f0c040; margin-bottom:24px;"></div>
        <div style="font-size:12px; color:#555; letter-spacing:3px;">DROPPING IN...</div>
        <div id="announce-countdown" style="font-size:56px; color:#fff; margin-top:8px; font-weight:bold;"></div>
    </div>

    <canvas id="g" width="460" height="600"></canvas>

    <div id="touch-ctrl">
        <div class="tc-btn" id="tc-left">◀</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="tc-btn" id="tc-up">▲</div>
            <div class="tc-btn" id="tc-down">▼</div>
        </div>
        <div class="tc-btn" id="tc-right">▶</div>
    </div>

    <div id="gov">
        <div id="msg-box" style="text-align:center; padding: 20px; width:100%;">
            <div class="gtitle">SKYFALL</div>
            <div class="gsubtitle">MERU GAMES</div>
            <div id="gfs" style="color:#fff; font-size:16px; margin-bottom:10px;"></div>
            <button id="gbtn" style="display:none;">BEGIN RE-ENTRY</button>
        </div>
    </div>
</div>

<script>
const CV = document.getElementById('g'), CX = CV.getContext('2d');
const W = CV.width, H = CV.height;
const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn');
const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), SPD = document.getElementById('spd');
const GFS = document.getElementById('gfs');
const RPANEL = document.getElementById('race-panel'), RPLIST = document.getElementById('rp-list');
const RPAIM = document.getElementById('rp-aim');
const TRBADGE = document.getElementById('target-rank-badge');
const SPEEDBARWRAP = document.getElementById('speed-bar-wrap');
const SPEEDBAR = document.getElementById('speed-bar-inner');
const ANNOUNCEOV = document.getElementById('announce-overlay');
const ANNOUNCERANK = document.getElementById('announce-rank');
const ANNOUNCESUFFIX = document.getElementById('announce-suffix');
const ANNOUNCECDWN = document.getElementById('announce-countdown');
const GHOSTHINT = document.getElementById('ghost-hint');

// ── SUIT CONFIGS ─────────────────────────────────────────────
const CHARS = {
    'BALANCED': { color: '#ffffff', speed: 1.2,  drift: 0.9,  info: "Standard entry"  },
    'TANK':     { color: '#ff5555', speed: 2.0,  drift: 0.45, info: "Heavy. Sturdy."  },
    'GHOST':    { color: '#00ffff', speed: 0.75, drift: 1.7,  info: "Agile. Fragile." },
    'DART':     { color: '#ffaa00', speed: 1.8,  drift: 1.2,  info: "Fast. Slippery." },
    'GLIDER':   { color: '#88ff44', speed: 0.9,  drift: 2.2,  info: "Float master."   }
};

const AI_NAMES = ['NOVA','RAZR','FLUX','JINX','ECHO','VEGA','RIFT','AXON','ZARA','KYTE','BLAZE','CYPH','DUSK','FANG','GUST','HAWK','IRIX','JADE','KNOX'];
const SUFFIXES = ['','ST','ND','RD','TH',   'TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH','TH'];
let selectedRacerCount = 10;
// ── DIVER CLASS ───────────────────────────────────────────────
class Diver {
    constructor(x, y, config, name = 'YOU', isAI = false) {
        this.x = x; this.y = y;
        this.config = config; this.name = name; this.isAI = isAI;
        this.vx = 0; this.vy = 0;
        this.w = 1; this.h = 1;
        this.legSwing = 0;
        this.landed = false;
        this.speedMult = 1.2;
        this.slowFactor = 1.0;
        this.slowTimer = 0;
        this.landY = 0;

        if (isAI) {
            this.ai = {
                fallRate:      config.speed * (0.3 + Math.random() * 0.6),
                driftStrength: config.drift * (0.6 + Math.random() * 0.8),
                agression:     0.4 + Math.random() * 1.2,
                dodgePower:    2.0 + Math.random() * 3.5,
                lookahead:     120 + Math.random() * 160,
                noise:         (Math.random() - 0.5) * 0.6,
                decisionRate:  Math.floor(4 + Math.random() * 10),
                _timer:        Math.floor(Math.random() * 10),
                _steer:        0,
            };
            this.vy = this.ai.fallRate * 0.5;
            this.altConsumed = 0; // tracks altitude fallen independent of player
        }
    }

    applyHit() {
        this.slowFactor = Math.max(0.25, this.slowFactor - 0.35);
        this.slowTimer = 180;
    }

    updateSlow() {
        if (this.slowTimer > 0) this.slowTimer--;
        if (this.slowFactor < 1.0) this.slowFactor = Math.min(1.0, this.slowFactor + 0.0015);
    }

    update(obstacles, raceTargetX) {
        if (this.landed) return;
        this.updateSlow();

        if (this.isAI) {
            const ai = this.ai;
            let naturalFall = ai.fallRate * this.slowFactor;
            this.vy += (naturalFall - this.vy) * 0.06;
            this.y += this.vy;
            // Track race progress in same units as player altitude drain.
            // Player drains 12 * speedMult * gameDiff/frame. Mirror that for AI using their vy
            // relative to their base fallRate as a speedMult equivalent.

            if (this.y > H - 40) this.vy *= -0.4;
            if (this.y < 30)     this.vy = Math.abs(this.vy) * 0.5;

            for (let o of obstacles) {
                let dx = this.x - o.x, dy = this.y - o.y;
                let dist = Math.hypot(dx, dy);
                let hitR = o.type === 'vortex' ? o.r * 0.7 : o.r + 14;
                if (dist < hitR) {
                    this.applyHit();
                    if (dist > 0) { this.vx += (dx / dist) * 3; this.vy -= 1; }
                    break;
                }
            }

            ai._timer++;
            if (ai._timer >= ai.decisionRate) {
                ai._timer = 0;
                let danger = null, minDist = 9999;
                for (let o of obstacles) {
                    let dx = Math.abs(o.x - this.x);
                    let dy = o.y - this.y;
                    if (dy > -20 && dy < ai.lookahead && dx < o.r + 35) {
                        if (dy < minDist) { minDist = dy; danger = o; }
                    }
                }
                if (danger) {
                    let closeness = 1 - minDist / ai.lookahead;
                    let dir = this.x < danger.x ? -1 : 1;
                    ai._steer = dir * ai.dodgePower * closeness;
                } else {
                    let diff = (raceTargetX + ai.noise * 80) - this.x;
                    ai._steer = diff * 0.018 * ai.agression;
                }
            }

            this.vx += ai._steer;
            this.vx += ai.noise * 0.15;
            this.vx *= (0.82 + (1 - ai.driftStrength * 0.08));
            this.vx = Math.max(-ai.driftStrength * 3, Math.min(ai.driftStrength * 3, this.vx));
            this.speedMult = this.vy / (this.ai.fallRate * 0.5 + 0.001);
        }

        this.x += this.vx;
        this.x = Math.max(22, Math.min(W - 22, this.x));
        this.legSwing += 0.18 * (this.isAI ? Math.abs(this.ai.fallRate) * 0.5 : 1);
    }

    draw(ctx, ghostMode) {
        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.isAI && ghostMode) {
            ctx.restore();
            return;
        }

        if (this.isAI) { ctx.shadowBlur = 8; ctx.shadowColor = this.config.color; }

        let drawColor = this.config.color;
        if (this.slowFactor < 0.95 && Math.floor(Date.now() / 120) % 2 === 0) drawColor = '#ff4444';

        const sMult = this.speedMult || 1.2;
        const tW = sMult < 1 ? 1.4 : (sMult > 2 ? 0.7 : 1);
        const tH = sMult < 1 ? 0.7 : (sMult > 2 ? 1.4 : 1);
        this.w += (tW - this.w) * 0.1;
        this.h += (tH - this.h) * 0.1;

        if (this.landed) {
            ctx.strokeStyle = drawColor; ctx.lineWidth = 3;
            // Standing figure
            ctx.beginPath(); ctx.arc(0, -35, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -29); ctx.lineTo(0, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-15, -10); ctx.lineTo(15, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-15, -10); ctx.lineTo(-22, -22); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(15, -10); ctx.lineTo(22, -22); ctx.stroke();
        } else {
            ctx.scale(this.w, this.h);
            ctx.rotate(this.vx * 0.06);
            ctx.strokeStyle = drawColor; ctx.lineWidth = 3;
            // Falling figure
            ctx.beginPath(); ctx.arc(0, 15, 7, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(0, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(18, 0); ctx.stroke();
            let k = Math.sin(this.legSwing) * 10;
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-7, -24 + k); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(7, -24 - k); ctx.stroke();

            // Slow indicator
            if (this.slowFactor < 0.99) {
                ctx.restore(); ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(-18, -50, 36, 5);
                ctx.fillStyle = `hsl(${this.slowFactor * 120}, 100%, 50%)`;
                ctx.fillRect(-18, -50, 36 * this.slowFactor, 5);
            }

            if (this.isAI) {
                ctx.restore(); ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(-18, 28, 36, 14);
                ctx.fillStyle = drawColor;
                ctx.font = '9px Fredoka One';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, 0, 39);
            }
        }
        ctx.restore();
    }
}

// ── GAME STATE ────────────────────────────────────────────────
let state = 'menu';
let player, competitors = [], obs = [], coins = [], lines = [];
let coinCount = 0, elapsed = 0, altitude = 100000, shake = 0, groundY = 0;
let gameDiff = 1, startAlt = 100000;
let raceTargetX = W / 2, targetChangeTimer = 0;
const TARGET_CHANGE_INTERVAL = 300;
let targetRank = 3;
let coinSpeedBoost = 0;
const COIN_BOOST_PER_COIN = 0.08;
const COIN_BOOST_MAX = 0.8;
const COIN_BOOST_DECAY = 0.0008;
let announceTimer = 0;
const ANNOUNCE_DURATION = 210;
let pendingCharKey = null;
let speedPopups = [];
let ghostMode = false;
let selectedMode = 'competitive';
let selectedChar = 'BALANCED';
let keys = {};
let animId = null;
let stars = [];
let particles = [];

// Pre-generate stars
for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.3, twinkle: Math.random() * Math.PI * 2 });
}

// ── ATMOSPHERE ────────────────────────────────────────────────
function getAtmosphereColor() {
    const t = Math.max(0, Math.min(1, altitude / startAlt));
    if (t > 0.85) return '#000000';
    if (t > 0.6)  return `#${lerpHex('030314', '070c2a', (t-0.6)/0.25)}`;
    if (t > 0.35) return `#${lerpHex('0d1f5e', '1a3a8a', (t-0.35)/0.25)}`;
    if (t > 0.15) return `#${lerpHex('2266cc', '4488ee', (t-0.15)/0.2)}`;
    return `#${lerpHex('55aaff', '99ccff', t/0.15)}`;
}

function lerpHex(a, b, t) {
    const ah = parseInt(a, 16), bh = parseInt(b, 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return ((rr << 16) | (rg << 8) | rb).toString(16).padStart(6, '0');
}

function drawStars() {
    const t = Date.now() * 0.001;
    stars.forEach(s => {
        const alpha = 0.4 + 0.6 * Math.max(0, Math.sin(t * 0.7 + s.twinkle));
        CX.fillStyle = `rgba(255,255,255,${alpha})`;
        CX.beginPath(); CX.arc(s.x, s.y, s.r, 0, Math.PI * 2); CX.fill();
    });
}

// ── PARTICLES ─────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5 - 2,
            life: 40 + Math.random() * 30,
            maxLife: 0,
            color,
            r: 2 + Math.random() * 3
        });
        particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
    }
}

// ── MENU ──────────────────────────────────────────────────────
function setupMenu() {
    state = 'menu';
    OV.style.display = 'flex';
    RPANEL.style.display = 'none';
    TRBADGE.style.display = 'none';
    SPEEDBARWRAP.style.display = 'none';
    ANNOUNCEOV.style.display = 'none';
    GHOSTHINT.style.display = 'none';
    announceTimer = 0;
    selectedMode = 'competitive';
    selectedChar = 'BALANCED';

    GFS.innerHTML = `
        <div style="font-size:20px; color:#f0c040; margin-bottom:14px; letter-spacing:2px;">MISSION CONFIG</div>
        <div style="margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:10px;">
            <span style="color:#888; font-size:13px;">HEIGHT:</span>
            <select id="selAlt">
                <option value="50000">50 km</option>
                <option value="100000" selected>100 km</option>
                <option value="300000">300 km</option>
            </select>
        </div>
        <div style="margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:10px;">
            <span style="color:#888; font-size:13px;">DIFFICULTY:</span>
            <select id="selDiff">
                <option value="0.6">🟢 ROOKIE</option>
                <option value="1" selected>🟡 ACE</option>
                <option value="1.8">🔴 ELITE</option>
            </select>
        </div>
        <div style="margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px;">
            <span style="color:#888; font-size:13px;">MODE:</span>
            <button class="mode-btn selected" id="btn-competitive" onclick="selectMode('competitive')">⚔ COMPETITIVE</button>
            <button class="mode-btn" id="btn-ghost" onclick="selectMode('ghost')">👻 GHOST</button>
        </div>
        <div style="border-top:1px solid #2a2a3e; padding-top:12px; margin-bottom:8px; font-size:13px; color:#666; letter-spacing:2px;">SELECT YOUR SUIT</div>
        <div style="display:flex; flex-wrap:wrap; justify-content:center;">
        ${Object.keys(CHARS).map(key => `
            <button class="sel-btn ${key === 'BALANCED' ? 'active-suit' : ''}"
                id="suit-${key}"
                onclick="selectChar('${key}')"
                style="background:${CHARS[key].color}18; color:${CHARS[key].color}; border-color:${CHARS[key].color}55;">
                ${key}<br><span style="font-size:11px; opacity:0.7;">${CHARS[key].info}</span>
            </button>
        `).join('')}
        </div>
        <button id="gbtn" onclick="preStart()" style="display:block !important; margin:18px auto 0;">BEGIN RE-ENTRY</button>
    `;

    if (!animId) animId = requestAnimationFrame(loop);
}

function selectMode(mode) {
    selectedMode = mode;
    document.getElementById('btn-competitive').classList.toggle('selected', mode === 'competitive');
    document.getElementById('btn-ghost').classList.toggle('selected', mode === 'ghost');
}

function selectChar(key) {
    selectedChar = key;
    document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active-suit'));
    const el = document.getElementById('suit-' + key);
    if (el) el.classList.add('active-suit');
}

function preStart() {
    startAlt = parseInt(document.getElementById('selAlt').value);
    gameDiff = parseFloat(document.getElementById('selDiff').value);
    ghostMode = (selectedMode === 'ghost');
    pendingCharKey = selectedChar;

    const totalDivers = 1 + AI_NAMES.length;
    targetRank = 1 + Math.floor(Math.random() * totalDivers);
    const suffix = SUFFIXES[targetRank] || 'TH';
    ANNOUNCERANK.textContent = targetRank;
    ANNOUNCESUFFIX.textContent = suffix;
    ANNOUNCEOV.style.display = 'flex';
    announceTimer = ANNOUNCE_DURATION;

    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
}

// ── START GAME ────────────────────────────────────────────────
function startGame(charKey) {
    if (animId) cancelAnimationFrame(animId);

    const config = CHARS[charKey];
    const totalRacers = 1 + AI_NAMES.length; // 11 total
    const startY = -120; // all start above screen on same line
    const margin = 24;
    const spacing = (W - margin * 2) / (totalRacers - 1);

    // Player gets a random slot among all racers
    const playerSlot = Math.floor(Math.random() * totalRacers);
    player = new Diver(margin + playerSlot * spacing, startY, config, 'YOU', false);
    player.speedMult = 1.2;
    player.slowFactor = 1.0;

    const aiKeys = Object.keys(CHARS);
    let aiIndex = 0;
    competitors = [];
    for (let slot = 0; slot < totalRacers; slot++) {
        if (slot === playerSlot) continue;
        const name = AI_NAMES[aiIndex];
        const suit = aiKeys[aiIndex % aiKeys.length];
        const d = new Diver(margin + slot * spacing, startY, CHARS[suit], name, true);
        d.vx = (Math.random() - 0.5) * 2;
        competitors.push(d);
        aiIndex++;
    }

    obs = []; coins = []; lines = []; particles = [];
    coinCount = 0; coinSpeedBoost = 0; speedPopups = [];
    elapsed = 0; altitude = startAlt; shake = 0; groundY = H + 300;
    raceTargetX = W / 2; targetChangeTimer = 0;

    keys = {};
    state = 'ascending';
    OV.style.display = 'none';
    RPANEL.style.display = ghostMode ? 'none' : 'block';
    TRBADGE.style.display = 'block';
    SPEEDBARWRAP.style.display = 'flex';
    GHOSTHINT.style.display = ghostMode ? 'block' : 'none';

    for (let i = 0; i < 45; i++) {
        lines.push({ x: Math.random() * W, y: Math.random() * H, s: 5 + Math.random() * 15 });
    }
    updateHUD();
    animId = requestAnimationFrame(loop);
}

// ── HUD ───────────────────────────────────────────────────────
function updateHUD() {
    const altKm = Math.max(0, Math.round(altitude / 1000));
    ALT.textContent = altKm;
    CN.textContent = coinCount;
    const spdPct = player ? Math.round(player.speedMult * 100) : 100;
    SPD.textContent = spdPct + '%';

    if (player) {
        const barH = Math.min(100, Math.round(player.speedMult * 50));
        SPEEDBAR.style.height = barH + '%';
        SPEEDBAR.style.background = player.speedMult > 2 ? '#ff4444' : player.speedMult > 1.5 ? '#ffaa00' : '#4dff88';
    }

    const suffix = SUFFIXES[targetRank] || 'TH';
    TRBADGE.textContent = `🎯 TARGET: ${targetRank}${suffix} PLACE`;
    TRBADGE.style.color = '#f0c040';
}

function updateRacePanel() {
    if (ghostMode) return;
    // Player doesn't move down screen — world scrolls for them.
    // Convert altitude consumed into a comparable virtual screen y:
    // At race start playerConsumed=0 → virtualY=0 (top). At finish playerConsumed=startAlt → virtualY=H.
    const playerConsumed = startAlt - altitude;
    const playerVirtualY = (playerConsumed / startAlt) * H;

    const all = [player, ...competitors];
    const sorted = [...all].sort((a, b) => {
        const aY = a === player ? playerVirtualY : a.y;
        const bY = b === player ? playerVirtualY : b.y;
        return bY - aY; // higher screen y = further down = better rank
    });
    RPAIM.textContent = `AIM: #${targetRank}`;
    RPLIST.innerHTML = sorted.slice(0, 11).map((d, i) => {
        const isYou = d === player;
        const color = isYou ? '#f0c040' : d.config.color;
        const rank = i + 1;
        const marker = rank === targetRank ? '⬤ ' : '';
        return `<div class="rp-entry" style="color:${color}; ${isYou ? 'font-size:12px;' : ''}">
            ${marker}#${rank} ${d.name}${d.landed ? ' ✓' : ''}
        </div>`;
    }).join('');
}

// ── OBSTACLES ─────────────────────────────────────────────────
function spawnObstacle() {
    if (altitude < 1500) return;
    const types = ['rock', 'rock', 'rock', 'vortex', 'debris', 'shockwave'];
    const type = types[Math.floor(Math.random() * types.length)];
    const x = 25 + Math.random() * (W - 50);
    let o = { x, y: H + 60, type, phase: 0, _pHit: false };

    switch (type) {
        case 'rock':
            o.r = 11 + Math.random() * 22;
            o.sides = 5 + Math.floor(Math.random() * 4);
            o.rot = Math.random() * Math.PI;
            break;
        case 'vortex':
            o.r = 28 + Math.random() * 20;
            o.angle = 0;
            o.color = `hsl(${200 + Math.random() * 60}, 80%, 60%)`;
            break;
        case 'debris':
            o.r = 8 + Math.random() * 10;
            o.pieces = Array.from({ length: 5 }, () => ({
                dx: (Math.random() - 0.5) * 30,
                dy: (Math.random() - 0.5) * 30,
                r: 3 + Math.random() * 5
            }));
            break;
        case 'shockwave':
            o.r = 15;
            o.opacity = 1.0;
            o.color = `hsl(${30 + Math.random() * 30}, 100%, 65%)`;
            break;
    }
    obs.push(o);
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
    if (announceTimer > 0) {
        announceTimer--;
        const secs = Math.ceil(announceTimer / 60);
        ANNOUNCECDWN.textContent = secs > 0 ? secs : '🚀';
        if (announceTimer <= 0) {
            ANNOUNCEOV.style.display = 'none';
            startGame(pendingCharKey);
        }
        return;
    }

    if (!player || player.landed) return;
    elapsed++;
    if (shake > 0) shake *= 0.82;

    if (coinSpeedBoost > 0) coinSpeedBoost = Math.max(0, coinSpeedBoost - COIN_BOOST_DECAY);

    speedPopups = speedPopups.filter(p => { p.life--; p.y -= 0.8; return p.life > 0; });
    particles = particles.filter(p => { p.life--; p.x += p.vx; p.y += p.vy; p.vy += 0.1; return p.life > 0; });

    targetChangeTimer++;
    if (targetChangeTimer >= TARGET_CHANGE_INTERVAL) {
        raceTargetX = 60 + Math.random() * (W - 120);
        targetChangeTimer = 0;
    }

    if (state === 'ascending') {
        player.y += 4;
        competitors.forEach(c => { c.y += 4; });
        if (player.y >= H * 0.35) state = 'play';
    }

    if (state === 'play') {
        let baseSpeed = 1.2;
        if (keys.w || keys.ArrowUp)   baseSpeed = 0.45;
        if (keys.s || keys.ArrowDown) baseSpeed = 2.6;
        player.speedMult = (baseSpeed + coinSpeedBoost) * player.slowFactor;

        if (keys.a || keys.ArrowLeft)  player.vx -= player.config.drift;
        if (keys.d || keys.ArrowRight) player.vx += player.config.drift;
        player.vx *= 0.86;
        player.x += player.vx;
        player.x = Math.max(22, Math.min(W - 22, player.x));
        player.legSwing += 0.18;
        player.updateSlow();

        altitude -= 12 * player.speedMult * gameDiff;

        competitors.forEach(c => c.update(obs, raceTargetX));

        if (altitude <= 0) { altitude = 0; handleLanding(); }

        const spawnRate = Math.max(6, Math.floor(32 / (player.speedMult * gameDiff)));
        if (elapsed % spawnRate === 0) spawnObstacle();

        const obsScrollSpeed = 5.5 * gameDiff;
        for (let o of obs) {
            o.y -= obsScrollSpeed;
            o.phase = (o.phase || 0) + 0.05;
            if (o.type === 'vortex') o.angle = (o.angle || 0) + 0.07;
            if (o.type === 'shockwave') {
                o.r += 0.5;
                o.opacity = Math.max(0, (o.opacity || 1) - 0.008);
            }

            let pDist = Math.hypot(player.x - o.x, player.y - o.y);
            let hitR = o.type === 'vortex' ? o.r * 0.6 : o.type === 'shockwave' ? o.r * 0.5 : o.r + 13;
            if (pDist < hitR && !o._pHit) {
                o._pHit = true;
                player.applyHit();
                shake = 22;
                spawnParticles(player.x, player.y, player.config.color, 10);
                if (o.type === 'vortex') player.vx += (o.x - player.x) * 0.08;
            }
            if (pDist > hitR + 10) o._pHit = false;
        }

        for (let c of coins) {
            c.y -= obsScrollSpeed * 0.9;
            if (Math.hypot(player.x - c.x, player.y - c.y) < 24) {
                coinCount++; c.y = -3000;
                coinSpeedBoost = Math.min(COIN_BOOST_MAX, coinSpeedBoost + COIN_BOOST_PER_COIN);
                speedPopups.push({ x: player.x, y: player.y - 30, life: 55 });
                spawnParticles(c.x, c.y, '#f0c040', 6);
            }
        }
        if (elapsed % 75 === 0 && altitude > 800) {
            coins.push({ x: 30 + Math.random() * (W - 60), y: H + 50 });
        }

        obs = obs.filter(o => o.y > -200 && (o.type !== 'shockwave' || o.opacity > 0));
        coins = coins.filter(c => c.y > -200);
    }

    updateHUD();
    updateRacePanel();
}

function handleLanding() {
    groundY -= 6;
    if (groundY <= player.y + 28) {
        player.landed = true;
        player.landY = player.y;

        // Player has consumed all altitude (virtualY = H = maximum progress).
        // Rank everyone by their y position: AI actual y vs player virtualY = H.
        const playerVirtualY = H;

        const all = [
            { diver: player, y: playerVirtualY },
            ...competitors.map(c => ({ diver: c, y: c.y }))
        ];
        all.sort((a, b) => b.y - a.y); // highest y = furthest fallen = #1

        const finalRank = all.findIndex(e => e.diver === player) + 1;

        // Mark all AI as landed and spread visually by rank
        competitors.forEach(c => { c.landed = true; });
        const aiRanked = all.filter(e => e.diver !== player).map(e => e.diver);
        aiRanked.forEach((c, i) => {
            c.y = player.y + (i - Math.floor(aiRanked.length / 2)) * 38;
            c.landY = c.y;
        });
        player.landY = player.y;

        setTimeout(() => showOver(finalRank, all), 1300);
    }
}

// ── GAME OVER ─────────────────────────────────────────────────
function showOver(finalRank, leaderboard) {
    const won = finalRank === targetRank;
    const suffix = SUFFIXES[finalRank] || 'TH';
    const targetSuffix = SUFFIXES[targetRank] || 'TH';

    let resultEmoji, resultText, resultColor;
    if (won) {
        resultEmoji = '🏆';
        resultText = 'PERFECT LANDING!';
        resultColor = '#f0c040';
    } else if (Math.abs(finalRank - targetRank) === 1) {
        resultEmoji = '😅';
        resultText = 'SO CLOSE!';
        resultColor = '#ff9900';
    } else {
        resultEmoji = '💥';
        resultText = 'MISSION FAILED';
        resultColor = '#ff4444';
    }

    const boardHTML = leaderboard ? leaderboard.map((e, i) => {
        const isYou = e.diver === player;
        const rank = i + 1;
        const rankSuffix = SUFFIXES[rank] || 'TH';
        const col = isYou ? resultColor : e.diver.config.color;
        const marker = rank === targetRank ? '🎯 ' : '';
        return `<div style="color:${col}; font-size:${isYou ? '13px' : '11px'}; margin:2px 0; ${isYou ? 'font-weight:bold;' : 'opacity:0.75;'}">
            ${marker}#${rank}${rankSuffix} ${e.diver.name}${isYou ? ' ◀' : ''}
        </div>`;
    }).join('') : '';

    GFS.innerHTML = `
        <div style="font-size:44px; margin:4px 0;">${resultEmoji}</div>
        <div style="font-size:20px; color:${resultColor}; margin-bottom:8px; letter-spacing:2px;">${resultText}</div>
        <div style="font-size:13px; color:#666; margin-bottom:2px;">TARGET: <span style="color:#f0c040;">#${targetRank}${targetSuffix}</span> &nbsp;|&nbsp; YOUR RANK: <span style="color:${resultColor};">#${finalRank}${suffix}</span></div>
        <div style="font-size:13px; color:#666; margin-bottom:10px;">COINS: <span style="color:#f0c040;">${coinCount}</span>${ghostMode ? ' &nbsp;|&nbsp; <span style="color:#00ccff;">GHOST MODE</span>' : ''}</div>
        <div style="border-top:1px solid #2a2a3e; padding-top:8px; margin-bottom:10px;">${boardHTML}</div>
        <div style="font-size:11px; color:#444;">
            ${won ? 'Precision perfect. Master of the fall.' : 'Adjust your descent strategy and try again.'}
        </div>
    `;
    BTN.textContent = 'FLY AGAIN';
    BTN.style.display = 'block';
    BTN.onclick = setupMenu;
    OV.style.display = 'flex';
    TRBADGE.style.display = 'none';
    SPEEDBARWRAP.style.display = 'none';
    GHOSTHINT.style.display = 'none';
}

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
    CX.save();
    if (shake > 0.5) CX.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

    CX.fillStyle = getAtmosphereColor();
    CX.fillRect(0, 0, W, H);

    if (altitude > 40000) drawStars();

    // Streaks
    lines.forEach(l => {
        if (state === 'play') l.y -= l.s * (player ? player.speedMult : 1) * 0.7;
        if (l.y < -60) { l.y = H + 60; l.x = Math.random() * W; }
        const alpha = Math.min(0.3, 0.05 + 0.25 * (1 - altitude / startAlt));
        CX.fillStyle = `rgba(255,255,255,${alpha})`;
        CX.fillRect(l.x, l.y, 1.5, l.s);
    });

    // Ground
    if (altitude < 8000) {
        const gAlpha = Math.min(1, (8000 - altitude) / 4000);
        CX.globalAlpha = gAlpha;
        CX.fillStyle = '#1b3311'; CX.fillRect(0, groundY, W, H);
        CX.fillStyle = '#2d521c'; CX.fillRect(0, groundY, W, 18);
        // Grid lines on ground
        CX.strokeStyle = '#224411'; CX.lineWidth = 1;
        for (let gx = 0; gx < W; gx += 40) {
            CX.beginPath(); CX.moveTo(gx, groundY); CX.lineTo(gx, H); CX.stroke();
        }
        CX.globalAlpha = 1;
    }

    // Obstacles
    obs.forEach(o => {
        CX.save();
        switch (o.type) {
            case 'rock':
                CX.shadowBlur = 8; CX.shadowColor = '#ff4444';
                CX.fillStyle = '#2a2a2a';
                CX.beginPath();
                for (let i = 0; i < o.sides; i++) {
                    const ang = o.rot + (i / o.sides) * Math.PI * 2;
                    const rx = o.x + Math.cos(ang) * o.r, ry = o.y + Math.sin(ang) * o.r;
                    i === 0 ? CX.moveTo(rx, ry) : CX.lineTo(rx, ry);
                }
                CX.closePath(); CX.fill();
                CX.strokeStyle = '#ff4444'; CX.lineWidth = 1.5; CX.stroke();
                break;

            case 'vortex':
                for (let ring = 3; ring > 0; ring--) {
                    const rr = o.r * (ring / 3);
                    CX.beginPath();
                    CX.arc(o.x, o.y, rr, o.angle + ring * 0.5, o.angle + ring * 0.5 + Math.PI * 1.5);
                    CX.strokeStyle = o.color;
                    CX.lineWidth = 3 - ring * 0.5;
                    CX.globalAlpha = 0.3 + ring * 0.2;
                    CX.stroke();
                }
                CX.globalAlpha = 0.6;
                CX.beginPath(); CX.arc(o.x, o.y, 8, 0, Math.PI * 2);
                CX.fillStyle = o.color; CX.fill();
                CX.globalAlpha = 1;
                break;

            case 'debris':
                CX.shadowBlur = 4; CX.shadowColor = '#888';
                o.pieces.forEach(p => {
                    CX.fillStyle = '#555';
                    CX.beginPath(); CX.arc(o.x + p.dx, o.y + p.dy, p.r, 0, Math.PI * 2); CX.fill();
                    CX.strokeStyle = '#999'; CX.lineWidth = 1; CX.stroke();
                });
                break;

            case 'shockwave':
                CX.globalAlpha = o.opacity * 0.7;
                CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                CX.strokeStyle = o.color; CX.lineWidth = 4; CX.stroke();
                CX.globalAlpha = o.opacity * 0.15;
                CX.fillStyle = o.color; CX.fill();
                CX.globalAlpha = 1;
                break;
        }
        CX.restore();
    });

    // Coins
    coins.forEach(c => {
        if (c.y < -100) return;
        const t = Date.now() * 0.004;
        CX.save();
        CX.shadowBlur = 12; CX.shadowColor = '#f0c040';
        CX.fillStyle = '#f0c040';
        CX.beginPath(); CX.arc(c.x, c.y, 8 + Math.sin(t) * 1.5, 0, Math.PI * 2); CX.fill();
        CX.strokeStyle = '#aa8800'; CX.lineWidth = 1.5; CX.stroke();
        CX.fillStyle = '#aa8800';
        CX.font = 'bold 9px sans-serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
        CX.fillText('$', c.x, c.y);
        CX.restore();
    });

    // Particles
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        CX.fillStyle = p.color + Math.round(alpha * 255).toString(16).padStart(2, '0');
        CX.beginPath(); CX.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2); CX.fill();
    });

    // Speed popups
    speedPopups.forEach(p => {
        const alpha = p.life / 55;
        CX.globalAlpha = alpha;
        CX.fillStyle = '#f0c040';
        CX.font = 'bold 13px Fredoka One';
        CX.textAlign = 'center';
        CX.fillText('+BOOST', p.x, p.y);
        CX.globalAlpha = 1;
    });

    // Draw players
    if (player) player.draw(CX, false);
    competitors.forEach(c => c.draw(CX, ghostMode));

    // Ghost mode reveal flash on landing
    if (ghostMode && player && player.landed) {
        CX.fillStyle = 'rgba(0,200,255,0.04)';
        CX.fillRect(0, 0, W, H);
    }

    // Altitude warning bars
    if (altitude < 3000 && altitude > 0) {
        const warnAlpha = (1 - altitude / 3000) * 0.4;
        CX.fillStyle = `rgba(255,80,0,${warnAlpha})`;
        CX.fillRect(0, 0, W, 8);
        CX.fillRect(0, H - 8, W, 8);
    }

    CX.restore();

    // Menu idle animation — draw falling figure on menu
    if (state === 'menu') {
        const t = Date.now() * 0.001;
        CX.save();
        CX.globalAlpha = 0.15;
        CX.strokeStyle = '#f0c040'; CX.lineWidth = 2;
        const mx = W / 2 + Math.sin(t * 0.4) * 60;
        const my = H / 2 + Math.sin(t * 0.3) * 80;
        CX.beginPath(); CX.arc(mx, my + 15, 7, 0, Math.PI * 2); CX.stroke();
        CX.beginPath(); CX.moveTo(mx, my + 8); CX.lineTo(mx, my - 10); CX.stroke();
        CX.beginPath(); CX.moveTo(mx - 18, my); CX.lineTo(mx + 18, my); CX.stroke();
        let k = Math.sin(t * 3) * 10;
        CX.beginPath(); CX.moveTo(mx, my - 10); CX.lineTo(mx - 7, my - 24 + k); CX.stroke();
        CX.beginPath(); CX.moveTo(mx, my - 10); CX.lineTo(mx + 7, my - 24 - k); CX.stroke();
        CX.restore();
    }
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop() {
    update();
    draw();
    animId = requestAnimationFrame(loop);
}

// ── CONTROLS ──────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
function setupTouch(id, key) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
    el.addEventListener('touchend',  e => { e.preventDefault(); keys[key] = false; });
    el.addEventListener('mousedown', () => { keys[key] = true; });
    el.addEventListener('mouseup',   () => { keys[key] = false; });
}
setupTouch('tc-left',  'a');
setupTouch('tc-right', 'd');
setupTouch('tc-up',    'w');
setupTouch('tc-down',  's');

// Init
setupMenu();
</script>
