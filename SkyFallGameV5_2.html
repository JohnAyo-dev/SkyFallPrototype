<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; position: fixed; width: 100%; }
        #ghud { display: flex; justify-content: space-between; width: 90%; max-width: 400px; margin-bottom: 10px; z-index: 10; pointer-events: none; }
        #gc { position: relative; width: 95vw; height: 80vh; max-width: 460px; max-height: 700px; }
        canvas { display: block; width: 100%; height: 100%; border: 4px solid #333; border-radius: 20px; background: #000; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; border-radius: 16px; text-align: center; padding: 20px; }
        #btn { padding: 15px 40px; background: #4caf50; border: none; color: #fff; border-radius: 50px; font-size: 24px; font-family: inherit; border-bottom: 5px solid #2e7d32; cursor: pointer; }
        .stat { color: #ffeb3b; }
    </style>
</head>
<body>

<div id="ghud">
    <div>ALT: <span id="alt" class="stat">100</span>km</div>
    <div>LIVES: <span id="lv" class="stat">★★★★★</span></div>
</div>

<div id="gc">
    <canvas id="g"></canvas>
    <div id="menu">
        <h1 style="font-size: 48px; color: #ffeb3b; margin-bottom: 10px;">SKYFALL</h1>
        <p id="msg" style="margin-bottom: 20px;">DODGE THE SPACE DEBRIS</p>
        <button id="btn">START</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    
    let w, h, player, obstacles, lives, altitude, groundY, gameActive = false;
    let keys = { left: false, right: false, down: false };

    function setup() {
        w = canvas.width = canvas.offsetWidth;
        h = canvas.height = canvas.offsetHeight;
    }

    function reset() {
        setup();
        player = { x: w/2, y: h/4, vx: 0, r: 12 };
        obstacles = [];
        lives = 5;
        altitude = 100000;
        groundY = h + 100;
        gameActive = true;
        menu.style.display = 'none';
        updateUI();
    }

    function updateUI() {
        document.getElementById('alt').innerText = Math.max(0, Math.floor(altitude/1000));
        document.getElementById('lv').innerText = '★'.repeat(Math.max(0, lives));
    }

    // Controls
    const handleInput = (x, isStart) => {
        if (x < w/3) keys.left = isStart;
        else if (x > (w/3)*2) keys.right = isStart;
        else keys.down = isStart;
    };

    canvas.addEventListener('touchstart', e => handleInput(e.touches[0].clientX - canvas.offsetLeft, true));
    canvas.addEventListener('touchend', () => keys = { left: false, right: false, down: false });
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    });
    window.addEventListener('keyup', () => keys = { left: false, right: false, down: false });

    function loop() {
        if (!gameActive) {
            requestAnimationFrame(loop);
            return;
        }

        ctx.fillStyle = altitude > 50000 ? '#000' : (altitude > 10000 ? '#1a237e' : '#81d4fa');
        ctx.fillRect(0, 0, w, h);

        let speed = keys.down ? 3 : 1;

        if (altitude > 0) {
            altitude -= (30 * speed);
            if (keys.left) player.vx -= 1;
            if (keys.right) player.vx += 1;
            player.vx *= 0.9;
            player.x += player.vx;
            player.x = Math.max(player.r, Math.min(w - player.r, player.x));

            if (Math.random() < 0.04) {
                obstacles.push({ x: Math.random()*w, y: h+50, r: 15+Math.random()*15, color: Math.random() > 0.8 ? '#f44336' : '#9e9e9e' });
            }
        } else {
            altitude = 0;
            groundY -= 5;
            if (groundY <= player.y + 20) {
                gameActive = false;
                menu.style.display = 'flex';
                msg.innerText = "MISSION SUCCESS!";
                btn.innerText = "AGAIN?";
            }
        }

        // Draw Ground
        if (altitude < 5000) {
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(0, groundY, w, h);
        }

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y -= (8 * speed);
            ctx.fillStyle = o.color;
            ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();

            // Collision
            let d = Math.hypot(player.x - o.x, player.y - o.y);
            if (d < player.r + o.r) {
                lives--;
                obstacles.splice(i, 1);
                updateUI();
                if (lives <= 0) {
                    gameActive = false;
                    menu.style.display = 'flex';
                    msg.innerText = "CRITICAL FAILURE!";
                    btn.innerText = "RETRY";
                }
            }
            if (o.y < -100) obstacles.splice(i, 1);
        }

        // Draw Player
        ctx.strokeStyle = keys.down ? '#ffeb3b' : '#fff';
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(player.x, player.y + player.r); ctx.lineTo(player.x, player.y + player.r + 15); ctx.stroke();

        updateUI();
        requestAnimationFrame(loop);
    }

    btn.addEventListener('click', reset);
    window.addEventListener('resize', setup);
    setup();
    loop();
</script>
</body>
</html>
