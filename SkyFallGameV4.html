<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; }
        #ghud { display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 460px; margin-bottom: 8px; font-size: 14px; text-shadow: 2px 2px 4px #000; }
        #gc { position: relative; width: 95%; max-width: 460px; }
        canvas#g { display: block; width: 100%; height: auto; border: 3px solid #444; border-radius: 20px; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #meru-logo { position: absolute; top: 15px; left: 15px; width: 55px; height: 55px; border-radius: 10px; border: 2px solid #6abb30; z-index: 15; opacity: 0.9; }
        #gov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10; border-radius: 18px; }
        .gtitle { font-size: 50px; color: #f0c040; -webkit-text-stroke: 2px #7a5010; margin-bottom: 5px; }
        #gbtn { padding: 14px 40px; background: #3a8820; border: none; border-bottom: 4px solid #225510; color: #fff; border-radius: 30px; font-size: 22px; cursor: pointer; transition: 0.1s; }
        #gbtn:active { transform: translateY(3px); border-bottom-width: 1px; }
        .stat-val { color: #f0c040; }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALTITUDE: <b id="alt" class="stat-val">100k</b>m</span>
    <span>COINS: <b id="cn" class="stat-val">0</b></span>
    <span>LIVES: <b id="lv" class="stat-val">★★★</b></span>
</div>

<div id="gc">
    <img src="image_2bb6e0.jpg" id="meru-logo" alt="Meru Games">
    <canvas id="g" width="460" height="600"></canvas>
    <div id="gov">
        <div class="gtitle">SKYFALL</div>
        <div id="gfs" style="color:#fff; font-size: 18px; display:none; text-align:center; margin-bottom:15px;"></div>
        <button id="gbtn">BEGIN RE-ENTRY</button>
    </div>
</div>

<script>
    const CV = document.getElementById('g'), CX = CV.getContext('2d');
    const W = CV.width, H = CV.height;
    const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn');
    const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), LV = document.getElementById('lv'), GFS = document.getElementById('gfs');

    let state = 'menu', player, obs, vortexes, coins, particles, lines, score, coinCount, lives, elapsed, altitude, shake = 0, keys;

    function init() {
        player = { x:W/2, y:H*0.25, vx:0, speedMult:1, legSwing:0, w:1, h:1 };
        obs=[]; vortexes=[]; coins=[]; particles=[]; lines=[];
        score=0; coinCount=0; lives=3; elapsed=0; altitude=100000; shake=0;
        keys = { a:false, d:false, w:false, s:false };
        for(let i=0; i<40; i++) lines.push({x: Math.random()*W, y: Math.random()*H, s: 5+Math.random()*15, o: Math.random()});
        LV.textContent = '★★★';
        CN.textContent = '0';
    }

    function getAtmosphereColor() {
        // 100k to 80k: Space (Black)
        if (altitude > 80000) return '#000000';
        // 80k to 50k: Thermosphere/Mesosphere (Deep Purple/Dark Blue)
        if (altitude > 50000) {
            let p = (altitude - 50000) / 30000;
            return `rgb(0, ${Math.floor(10 * (1-p))}, ${Math.floor(40 * (1-p))})`;
        }
        // 50k to 20k: Stratosphere (Deep Blue to Sky Blue)
        if (altitude > 20000) {
            let p = (altitude - 20000) / 30000;
            return `rgb(${Math.floor(30 * (1-p))}, ${Math.floor(100 * (1-p))}, ${Math.floor(255 * (1-p))})`;
        }
        // 20k to 0: Troposphere (Sky Blue to Ground/Haze)
        let p = altitude / 20000;
        return `rgb(${Math.floor(135 * p + 40*(1-p))}, ${Math.floor(206 * p + 30*(1-p))}, ${Math.floor(235 * p + 20*(1-p))})`;
    }

    function update() {
        elapsed++;
        if (shake > 0) shake *= 0.9;
        
        player.speedMult = keys.w ? 0.4 : (keys.s ? 2.8 : 1.2);
        altitude -= (10 * player.speedMult);
        if (altitude <= 0) { altitude = 0; state = 'win'; showOver("TOUCHDOWN SUCCESSFUL!"); }

        // Movement
        if (keys.a) player.vx -= 0.9;
        if (keys.d) player.vx += 0.9;
        player.vx *= 0.85;
        player.x += player.vx;
        player.x = Math.max(20, Math.min(W-20, player.x));
        player.legSwing += 0.2 * player.speedMult;

        // Background lines
        lines.forEach(l => {
            l.y -= (l.s * player.speedMult);
            if (l.y < -50) { l.y = H + 50; l.x = Math.random()*W; }
        });

        // Obstacles (Boulders)
        if (elapsed % Math.floor(50/player.speedMult) === 0) 
            obs.push({x: Math.random()*W, y: H+50, r: 15+Math.random()*20});
        
        obs.forEach(o => {
            o.y -= (6 * player.speedMult);
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + 12) {
                lives--; shake = 15; o.y = -200;
                LV.textContent = '★'.repeat(lives);
                if (lives <= 0) { state = 'over'; showOver("RE-ENTRY FAILED"); }
            }
        });

        // Vortex (Slingshot Effect)
        if (elapsed % 150 === 0) vortexes.push({x: Math.random()*W, y: H+50, r: 40});
        vortexes.forEach(v => {
            v.y -= (5 * player.speedMult);
            if (Math.hypot(player.x - v.x, player.y - v.y) < v.r) {
                // Massive boost + reversal
                player.vx = (player.x < v.x ? -25 : 25);
                shake = 8;
                v.y = -200;
            }
        });

        // Coins
        if (elapsed % 80 === 0) coins.push({x: Math.random()*W, y: H+50});
        coins.forEach(c => {
            c.y -= (5 * player.speedMult);
            if (Math.hypot(player.x - c.x, player.y - c.y) < 25) {
                coinCount++; CN.textContent = coinCount;
                c.y = -200;
            }
        });

        ALT.textContent = Math.floor(altitude/1000);
    }

    function draw() {
        CX.save();
        if (shake > 0.5) CX.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

        // Realistic Atmosphere Gradient
        CX.fillStyle = getAtmosphereColor();
        CX.fillRect(0,0,W,H);

        // Speed lines
        CX.strokeStyle = 'rgba(255,255,255,0.3)';
        lines.forEach(l => {
            CX.beginPath(); CX.moveTo(l.x, l.y); CX.lineTo(l.x, l.y + l.s*2); CX.stroke();
        });

        // Coins
        coins.forEach(c => {
            CX.fillStyle = '#f0c040'; CX.beginPath();
            CX.arc(c.x, c.y, 8, 0, Math.PI*2); CX.fill();
            CX.strokeStyle = '#fff'; CX.lineWidth = 2; CX.stroke();
        });

        // Boulders
        CX.fillStyle = '#444';
        obs.forEach(o => {
            CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, Math.PI*2); CX.fill();
        });

        // Super Vortex
        vortexes.forEach(v => {
            CX.strokeStyle = '#0ff'; CX.lineWidth = 3;
            for(let i=0; i<3; i++) {
                CX.beginPath();
                CX.arc(v.x, v.y, v.r * ((elapsed*0.05 + i/3)%1), 0, Math.PI*2);
                CX.stroke();
            }
        });

        drawDiver();
        CX.restore();
    }

    function drawDiver() {
        CX.save(); CX.translate(player.x, player.y);
        
        let targetW = keys.w ? 1.5 : (keys.s ? 0.6 : 1);
        let targetH = keys.w ? 0.6 : (keys.s ? 1.6 : 1);
        player.w += (targetW - player.w) * 0.1;
        player.h += (targetH - player.h) * 0.1;
        
        CX.scale(player.w, player.h);
        CX.rotate(player.vx * 0.06);
        
        // Heat glow if falling fast (S)
        if (keys.s) {
            CX.shadowBlur = 15; CX.shadowColor = '#f40';
            CX.strokeStyle = '#ff0';
        } else {
            CX.strokeStyle = '#fff';
        }
        
        CX.lineWidth = 3; CX.lineCap = 'round';
        CX.beginPath(); CX.arc(0, 15, 6, 0, Math.PI*2); CX.stroke(); // Head down
        CX.beginPath(); CX.moveTo(0, 10); CX.lineTo(0, -10); CX.stroke(); // Body
        CX.beginPath(); CX.moveTo(-15, 0); CX.lineTo(15, 0); CX.stroke(); // Arms
        let k = Math.sin(player.legSwing) * 12;
        CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(-6, -25+k); CX.stroke();
        CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(6, -25-k); CX.stroke();
        CX.restore();
    }

    function showOver(msg) { 
        OV.style.display='flex'; GFS.style.display='block'; 
        GFS.innerHTML = `${msg}<br><br>ALTITUDE: ${Math.floor(altitude/1000)}km<br>COINS COLLECTED: ${coinCount}`;
    }

    init();
    (function loop(){ if(state==='play') update(); draw(); requestAnimationFrame(loop); })();

    BTN.addEventListener('click', () => { init(); state='play'; OV.style.display='none'; });
    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
