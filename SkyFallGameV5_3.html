<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; position: fixed; width: 100%; }
        #ghud { display: flex; justify-content: space-between; align-items: center; width: 95%; max-width: 460px; margin-bottom: 8px; font-size: 14px; text-shadow: 2px 2px 4px #000; z-index: 20; }
        #gc { position: relative; width: 95%; height: 75vh; max-width: 460px; max-height: 600px; }
        canvas#g { display: block; width: 100%; height: 100%; border: 3px solid #444; border-radius: 20px; background: #000; }
        #gov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 30; border-radius: 18px; }
        .gtitle { font-size: 45px; color: #f0c040; -webkit-text-stroke: 1px #7a5010; margin-bottom: 5px; }
        #gbtn { padding: 16px 45px; background: #3a8820; border: none; border-bottom: 4px solid #225510; color: #fff; border-radius: 30px; font-size: 22px; cursor: pointer; }
        .stat-val { color: #f0c040; }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALT: <b id="alt" class="stat-val">100</b>km</span>
    <span>COINS: <b id="cn" class="stat-val">0</b></span>
    <span>LIVES: <b id="lv" class="stat-val">★★★★★</b></span>
</div>

<div id="gc">
    <canvas id="g"></canvas>
    <div id="gov">
        <div class="gtitle">SKYFALL</div>
        <div id="gfs" style="color:#fff; font-size: 18px; margin-bottom:20px; text-align:center;">DIVE TO EARTH</div>
        <button id="btn">START MISSION</button>
    </div>
</div>

<script>
    const CV = document.getElementById('g'), CX = CV.getContext('2d');
    const OV = document.getElementById('gov'), BTN = document.getElementById('btn');
    const ALT = document.getElementById('alt'), CN = document.getElementById('cn'), LV = document.getElementById('lv'), GFS = document.getElementById('gfs');

    let W, H, state = 'menu', player, obs, coins, lines, coinCount, lives, altitude, groundY, elapsed = 0, shake = 0;
    let keys = { a: false, d: false, s: false };

    function resize() {
        W = CV.width = CV.offsetWidth;
        H = CV.height = CV.offsetHeight;
    }

    function init() {
        resize();
        player = { x: W/2, y: H*0.25, vx: 0, w: 1, h: 1, legSwing: 0, landed: false };
        obs = []; coins = []; lines = [];
        for(let i=0; i<35; i++) lines.push({x: Math.random()*W, y: Math.random()*H, s: 5+Math.random()*15});
        coinCount = 0; lives = 5; altitude = 100000; groundY = H + 200; state = 'play';
        OV.style.display = 'none';
        updateHUD();
    }

    function updateHUD() {
        LV.textContent = '★'.repeat(Math.max(0, lives));
        CN.textContent = coinCount;
        ALT.textContent = Math.floor(altitude/1000);
    }

    // Touch Zones
    CV.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const tx = (e.touches[0].clientX - CV.getBoundingClientRect().left) / CV.offsetWidth * W;
        if (tx < W/3) keys.a = true;
        else if (tx > (W/3)*2) keys.d = true;
        else keys.s = true;
    }, {passive: false});

    CV.addEventListener('touchend', () => keys = { a: false, d: false, s: false });

    // Keyboard Fallback
    window.addEventListener('keydown', e => {
        if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
        if(e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
        if(e.key === 's' || e.key === 'ArrowDown') keys.s = true;
    });
    window.addEventListener('keyup', e => {
        if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
        if(e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
        if(e.key === 's' || e.key === 'ArrowDown') keys.s = false;
    });

    function update() {
        if (player.landed) return;
        elapsed++;
        if (shake > 0) shake *= 0.8;

        let speed = keys.s ? 2.8 : 1.2;
        
        if (altitude > 0) {
            altitude -= (22 * speed);
            if (keys.a) player.vx -= 0.9;
            if (keys.d) player.vx += 0.9;
            player.vx *= 0.85;
            player.x += player.vx;
            player.x = Math.max(25, Math.min(W-25, player.x));
            player.legSwing += 0.2 * speed;

            // Obstacles
            if (elapsed % 40 === 0) {
                const type = Math.random();
                obs.push({
                    x: Math.random()*W, y: H+50, 
                    r: type < 0.7 ? 15+Math.random()*10 : 25, 
                    type: type < 0.7 ? 'debris' : 'storm',
                    vx: type < 0.7 ? 0 : (Math.random()-0.5)*4
                });
            }
        } else {
            altitude = 0;
            groundY -= 4;
            if (groundY <= player.y + 35) player.landed = true;
        }

        obs.forEach((o, i) => {
            o.y -= (7 * speed);
            if (o.type === 'storm') o.x += o.vx;
            if (Math.hypot(player.x - o.x, player.y - o.y) < o.r + 10) {
                lives--; shake = 15; obs.splice(i, 1);
                updateHUD();
                if (lives <= 0) { state = 'menu'; OV.style.display = 'flex'; GFS.textContent = "RE-ENTRY FAILED"; }
            }
        });

        lines.forEach(l => {
            l.y -= (l.s * speed);
            if (l.y < -50) { l.y = H+50; l.x = Math.random()*W; }
        });
    }

    function draw() {
        CX.save();
        if (shake > 0.5) CX.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        
        // Atmosphere Background
        let bg = '#87ceeb';
        if (altitude > 80000) bg = '#000';
        else if (altitude > 40000) bg = '#1a237e';
        CX.fillStyle = bg;
        CX.fillRect(0,0,W,H);

        // Lines
        CX.strokeStyle = 'rgba(255,255,255,0.3)';
        lines.forEach(l => { CX.beginPath(); CX.moveTo(l.x, l.y); CX.lineTo(l.x, l.y + l.s); CX.stroke(); });

        // Ground
        if (altitude < 5000) {
            CX.fillStyle = '#4a7c2c';
            CX.fillRect(0, groundY, W, H);
        }

        // Debris
        obs.forEach(o => {
            CX.fillStyle = o.type === 'storm' ? '#f44' : '#666';
            CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, Math.PI*2); CX.fill();
        });

        // The Stickman
        CX.save();
        CX.translate(player.x, player.y);
        if (player.landed) {
            CX.strokeStyle = '#fff'; CX.lineWidth = 3;
            CX.beginPath(); CX.arc(0, -35, 6, 0, Math.PI*2); CX.stroke(); // Head
            CX.beginPath(); CX.moveTo(0, -29); CX.lineTo(0, -10); CX.stroke(); // Body
            CX.beginPath(); CX.moveTo(-10, -20); CX.lineTo(10, -20); CX.stroke(); // Arms
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(-7, 5); CX.stroke(); // Leg L
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(7, 5); CX.stroke(); // Leg R
        } else {
            let s = keys.s ? 1.5 : 1;
            CX.scale(1/s, s);
            CX.rotate(player.vx * 0.06);
            CX.strokeStyle = keys.s ? '#ff0' : '#fff'; CX.lineWidth = 3;
            CX.beginPath(); CX.arc(0, 15, 6, 0, Math.PI*2); CX.stroke(); // Head
            CX.beginPath(); CX.moveTo(0, 10); CX.lineTo(0, -10); CX.stroke(); // Body
            CX.beginPath(); CX.moveTo(-15, 0); CX.lineTo(15, 0); CX.stroke(); // Arms
            let k = Math.sin(player.legSwing) * 10;
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(-6, -22+k); CX.stroke();
            CX.beginPath(); CX.moveTo(0, -10); CX.lineTo(6, -22-k); CX.stroke();
        }
        CX.restore();
        CX.restore();
    }

    BTN.addEventListener('click', init);
    (function loop(){ if(state==='play') update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
