<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyFall: Precision — Meru Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka One', cursive; color: #fff; overflow: hidden; }
        #ghud { display: flex; justify-content: space-between; width: 95%; max-width: 460px; margin-bottom: 8px; font-size: 12px; z-index: 20; }
        #ghud span { background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 8px; padding: 4px 10px; }
        #gc { position: relative; width: 95%; max-width: 460px; }
        canvas#g { display: block; width: 100%; height: auto; border: 3px solid #444; border-radius: 20px; background: #000510; box-shadow: 0 0 20px rgba(0,100,255,0.2); }
        #race-panel { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #0af; border-radius: 8px; padding: 8px; font-size: 11px; z-index: 15; min-width: 120px; }
        .rp-title { color: #0ff; border-bottom: 1px solid #333; margin-bottom: 4px; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        #target-rank-display { color: #f0c040; font-weight: bold; margin-bottom: 5px; text-align: center; font-size: 14px; }
        #gov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 30; border-radius: 18px; text-align: center; }
        .gtitle { font-size: 48px; color: #0ff; text-shadow: 0 0 15px #07f; margin-bottom: 10px; }
        #gbtn { padding: 12px 35px; background: linear-gradient(#3a8820, #2a6810); border: none; color: #fff; border-radius: 25px; font-size: 20px; cursor: pointer; font-family: 'Fredoka One'; box-shadow: 0 4px 0 #1a4800; }
        #touch-ctrl { display: none; position: absolute; bottom: 15px; width: 100%; justify-content: space-between; padding: 0 20px; z-index: 20; }
        .tc-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid rgba(0,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0ff; }
        @media (pointer: coarse) { #touch-ctrl { display: flex; } }
    </style>
</head>
<body>

<div id="ghud">
    <span>ALT: <b id="alt" style="color:#0ff">100</b>km</span>
    <span>VEL: <b id="vel-pct" style="color:#0ff">100%</b></span>
    <span>GOLD: <b id="cn" style="color:#f0c040">0</b></span>
</div>

<div id="gc">
    <div id="race-panel">
        <div id="target-rank-display">GOAL: --</div>
        <div class="rp-title">LIVE STANDINGS</div>
        <div id="rp-list"></div>
    </div>
    <canvas id="g" width="460" height="600"></canvas>
    <div id="touch-ctrl">
        <div class="tc-btn" id="tc-left">◀</div>
        <div style="display:flex; flex-direction:column; gap:10px;"><div class="tc-btn" id="tc-up">▲</div><div class="tc-btn" id="tc-down">▼</div></div>
        <div class="tc-btn" id="tc-right">▶</div>
    </div>
    <div id="gov">
        <h1 class="gtitle">SKYFALL</h1>
        <div id="gfs" style="margin-bottom:20px;"></div>
        <button id="gbtn">START DROP</button>
    </div>
</div>

<script>
const CV = document.getElementById('g'), CX = CV.getContext('2d'), W = CV.width, H = CV.height;
const OV = document.getElementById('gov'), BTN = document.getElementById('gbtn'), GFS = document.getElementById('gfs');
const ALT = document.getElementById('alt'), VEL = document.getElementById('vel-pct'), CN = document.getElementById('cn'), TRD = document.getElementById('target-rank-display'), RPLIST = document.getElementById('rp-list');

const SUITS = {
    'BALANCED': { color: '#fff', speed: 1.0, drift: 0.9 },
    'TANK': { color: '#f55', speed: 1.3, drift: 0.5 },
    'GHOST': { color: '#0ff', speed: 0.8, drift: 1.4 },
    'DART': { color: '#fa0', speed: 1.2, drift: 1.1 }
};

class Diver {
    constructor(x, y, config, name, isAI) {
        this.x = x; this.y = y; this.config = config; this.name = name; this.isAI = isAI;
        this.vx = 0; this.vy = 0; this.stun = 0; this.legSwing = 0; this.landed = false;
        this.baseY = y; this.aiOffset = Math.random() * 40 - 20;
        this.aiIntelligence = Math.random();
    }
    update(tX, obstacles, pSpeed, rank, targetRank) {
        if (this.landed) return;
        if (this.stun > 0) this.stun -= 0.01;
        let penalty = (1 - this.stun * 0.75);

        if (this.isAI) {
            let aiSpeed = this.config.speed * 0.45 * penalty;
            if (rank < targetRank && this.aiIntelligence > 0.3) aiSpeed *= 0.65;
            this.vy = aiSpeed;
            this.y += (this.baseY + Math.sin(elapsed * 0.02 + this.aiOffset) * 20 - this.y) * 0.1;
            
            // Random jitter so they don't look like robots
            let steer = tX + (Math.sin(elapsed * 0.01) * 30);
            this.vx += (steer - this.x) * 0.003 * this.config.drift;
            this.vx *= 0.92;
        } else {
            let pBase = (keys.w ? 0.6 : (keys.s ? 2.4 : 1.2));
            this.vy = pBase * penalty;
            if (keys.a) this.vx -= this.config.drift;
            if (keys.d) this.vx += this.config.drift;
            this.vx *= 0.85;
        }
        this.x += this.vx;
        this.x = Math.max(20, Math.min(W - 20, this.x));
        this.legSwing += 0.1 * this.vy;
    }
    draw(ctx, rank) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.strokeStyle = this.config.color; ctx.lineWidth = 3;
        if (this.stun > 0) { ctx.shadowBlur = 10; ctx.shadowColor = 'red'; }
        
        // Character Body
        ctx.beginPath(); ctx.arc(0, 15, 6, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(0, -10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
        let k = Math.sin(this.legSwing) * 8;
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-7, -22+k); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(7, -22-k); ctx.stroke();
        
        // Name and Rank
        ctx.fillStyle = this.config.color; ctx.font = '10px Fredoka One'; ctx.textAlign = 'center';
        ctx.fillText(`${this.name} [#${rank}]`, 0, 32);
        
        // Trail effect if moving fast
        if (this.vy > 1.5) {
            ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.moveTo(0, 35); ctx.lineTo(0, 60); ctx.stroke();
            ctx.globalAlpha = 1;
        }
        ctx.restore();
    }
}

let player, competitors = [], obs = [], stars = [], elapsed = 0, altitude = 100000, targetX = W/2, goalRank = 1, coins = 0, keys = {}, state = 'menu';

// Setup background stars
for(let i=0; i<60; i++) stars.push({x: Math.random()*W, y: Math.random()*H, s: 0.5 + Math.random()*2, o: 0.2 + Math.random()*0.8});

function start(suitKey) {
    player = new Diver(W/2, H*0.4, SUITS[suitKey], "YOU", false);
    competitors = Object.keys(SUITS).map((s, i) => new Diver(Math.random()*W, 80 + i*75, SUITS[s], "NPC_"+(i+1), true));
    goalRank = Math.floor(Math.random()*4) + 1;
    TRD.textContent = "GOAL: FINISH #" + goalRank;
    obs = []; altitude = 100000; elapsed = 0; coins = 0; state = 'play';
    OV.style.display = 'none';
    loop();
}

function loop() {
    if (state !== 'play') return;
    elapsed++;
    if (elapsed % 240 === 0) targetX = 60 + Math.random()*(W-120);
    
    const all = [player, ...competitors].sort((a,b) => Math.abs(a.x - targetX) - Math.abs(b.x - targetX));
    const pRank = all.indexOf(player) + 1;

    player.update(targetX, obs, 1, pRank, goalRank);
    competitors.forEach(c => c.update(targetX, obs, player.vy, all.indexOf(c)+1, goalRank));

    altitude -= 20 * player.vy;
    if (altitude <= 0) {
        state = 'over';
        OV.style.display = 'flex';
        let win = pRank === goalRank;
        GFS.innerHTML = `<h2 style="color:${win?'#4f4':'#f44'}">${win?'TARGET REACHED':'MISSED RANK'}</h2><p>You finished #${pRank}<br>Goal was #${goalRank}<br>Coins: ${coins}</p>`;
        BTN.textContent = "RE-DROP";
        return;
    }

    // Spawn Obstacles, Wind, and Coins
    if (elapsed % 50 === 0) {
        let rng = Math.random();
        if (rng > 0.7) obs.push({ x: Math.random()*W, y: H+50, r: 25, type: 'vortex' });
        else if (rng > 0.4) obs.push({ x: Math.random()*W, y: H+50, w: 100, h: 40, type: 'wind', force: (Math.random()-0.5)*15 });
        else if (rng > 0.1) obs.push({ x: Math.random()*W, y: H+50, r: 12, type: 'coin' });
        else obs.push({ x: Math.random()*W, y: H+50, r: 20, type: 'emp' });
    }

    obs.forEach((o, i) => {
        o.y -= 8 * player.vy;
        [player, ...competitors].forEach(d => {
            let dist = Math.hypot(d.x - o.x, d.y - o.y);
            if (o.type === 'wind') {
                if (d.x > o.x && d.x < o.x + o.w && d.y > o.y && d.y < o.y + o.h) { d.vx += o.force * 0.05; }
            } else if (dist < o.r + 15) {
                if (o.type === 'vortex') d.vx += (o.x - d.x) * 0.1;
                else if (o.type === 'emp') d.stun = 1.0;
                else if (o.type === 'coin' && !d.isAI) { coins++; CN.textContent = coins; obs.splice(i, 1); }
            }
        });
    });
    obs = obs.filter(o => o.y > -100);

    // DRAWING
    CX.fillStyle = '#000510'; CX.fillRect(0,0,W,H);
    
    // Background Stars
    stars.forEach(s => {
        s.y -= s.s * player.vy * 2;
        if(s.y < 0) { s.y = H; s.x = Math.random()*W; }
        CX.fillStyle = `rgba(255,255,255,${s.o})`;
        CX.fillRect(s.x, s.y, s.s, s.s);
    });

    // Beacon Line
    CX.setLineDash([10, 20]); CX.strokeStyle = 'rgba(0, 255, 255, 0.15)';
    CX.beginPath(); CX.moveTo(targetX, 0); CX.lineTo(targetX, H); CX.stroke();
    CX.setLineDash([]);
    
    obs.forEach(o => {
        if (o.type === 'wind') {
            CX.fillStyle = 'rgba(0, 255, 255, 0.1)';
            CX.fillRect(o.x, o.y, o.w, o.h);
            CX.strokeStyle = '#0ff'; CX.lineWidth = 1;
            for(let j=0; j<3; j++) { // Wind lines
                let lineY = o.y + (elapsed*2 + j*10)%o.h;
                CX.beginPath(); CX.moveTo(o.x, lineY); CX.lineTo(o.x+o.w, lineY); CX.stroke();
            }
        } else if (o.type === 'coin') {
            CX.fillStyle = '#f0c040'; CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, 7); CX.fill();
            CX.strokeStyle = '#fff'; CX.stroke();
        } else {
            CX.beginPath(); CX.arc(o.x, o.y, o.r, 0, 7);
            CX.strokeStyle = o.type === 'vortex' ? '#a0f' : '#f44';
            CX.lineWidth = 3; CX.stroke();
        }
    });

    competitors.forEach(c => c.draw(CX, all.indexOf(c)+1));
    player.draw(CX, pRank);

    ALT.textContent = Math.floor(altitude/1000);
    VEL.textContent = Math.round((1 - player.stun*0.75)*100) + "%";
    RPLIST.innerHTML = all.map((d,i)=>`<div style="color:${d.config.color}; ${d===player?'border:1px solid #0ff; background:rgba(0,255,255,0.1);':''}">${i+1}. ${d.name} (${Math.round(Math.abs(d.x-targetX))}m)</div>`).join('');

    requestAnimationFrame(loop);
}

BTN.onclick = () => {
    GFS.innerHTML = "<h3>SELECT SUIT</h3>" + Object.keys(SUITS).map(s => `<button onclick="start('${s}')" style="margin:5px; padding:10px; background:#111; color:${SUITS[s].color}; border:2px solid; border-radius:12px; font-family:'Fredoka One'">${s}</button>`).join('');
    BTN.style.display = 'none';
};

window.onkeydown = e => { keys[e.key[0].toLowerCase()] = true; if(e.key.includes('Ar')) keys[e.key.replace('Arrow','')[0].toLowerCase()] = true; };
window.onkeyup = e => { keys[e.key[0].toLowerCase()] = false; if(e.key.includes('Ar')) keys[e.key.replace('Arrow','')[0].toLowerCase()] = false; };

const tBind = (id, k) => { document.getElementById(id).ontouchstart = e => { e.preventDefault(); keys[k] = true; }; document.getElementById(id).ontouchend = e => { e.preventDefault(); keys[k] = false; }; };
tBind('tc-left','a'); tBind('tc-right','d'); tBind('tc-up','w'); tBind('tc-down','s');
</script>
</body>
</html>
